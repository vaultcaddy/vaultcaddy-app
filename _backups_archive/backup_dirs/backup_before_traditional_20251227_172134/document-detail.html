    <!-- 🔒 頁面保護 -->
    <style>
        body.auth-checking { visibility: hidden !important; }
        .auth-loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: flex; align-items: center; justify-content: center; z-index: 9999; visibility: visible !important; }
        body.auth-ready .auth-loading { display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
    <script>
        document.documentElement.classList.add('auth-checking');
        if (document.body) { document.body.classList.add('auth-checking'); } 
        else { document.addEventListener('DOMContentLoaded', function() { document.body.classList.add('auth-checking'); }); }
        
        // ✅ 超時保護：10秒後強制顯示頁面（防止卡住）
        setTimeout(function() {
            if (document.body.classList.contains('auth-checking')) {
                console.warn('⚠️ Auth 初始化超時（10秒），強制顯示頁面');
                document.body.classList.remove('auth-checking');
                document.body.classList.add('auth-ready');
                
                // 如果沒有登入，重定向到首頁
                if (!window.simpleAuth | !window.simpleAuth.currentUser) {
                    console.log('❌ 超時且未登入，重定向到首頁');
                    setTimeout(function() {
                        window.location.href = 'index.html';
                    }, 1000);
                }
            }
        }, 10000);
    </script>

    <!-- ✅ 提前定義 goBackToDashboard 函數 -->
    <script>
        // 返回儀表板（提前定義，避免 ReferenceError）
        function goBackToDashboard() {
            const params = new URLSearchParams(window.location.search);
            const projectId = params.get('project');
            if (projectId) {
                window.location.href = `firstproject.html?project=${projectId}`;
            } else {
                window.location.href = 'dashboard.html';
            }
        }
        
        // 🔥 刪除當前文檔
        async function deleteCurrentDocument() {
            const confirmDelete = confirm('確定要刪除此文檔嗎？此操作無法撤銷。');
            if (!confirmDelete) return;
            
            try {
                const params = new URLSearchParams(window.location.search);
                const projectId = params.get('project');
                const documentId = params.get('id');
                
                if (!projectId | !documentId) {
                    alert('無法獲取文檔信息');
                    return;
                }
                
                // 從 Firestore 刪除文檔
                if (firebase && firebase.firestore) {
                    await firebase.firestore()
                        .collection('projects')
                        .doc(projectId)
                        .collection('documents')
                        .doc(documentId)
                        .delete();
                    
                    console.log('✅ 文檔已刪除:', documentId);
                    alert('文檔已成功刪除');
                    
                    // 返回儀表板
                    goBackToDashboard();
                } else {
                    alert('無法連接到數據庫');
                }
            } catch (error) {
                console.error('❌ 刪除文檔失敗:', error);
                alert('刪除文檔失敗: ' + error.message);
            }
        }
    </script>

    <!-- PDF 放大查看功能 -->
    <script>
        let modalCurrentPageIndex = 0;
        let modalPdfPages = [];
        
        // 初始化 PDF 放大功能
        function initPdfZoom() {
            // 獲取所有 PDF 頁面圖片
            const pdfImages = document.querySelectorAll('.pdf-page img');
            modalPdfPages = Array.from(pdfImages);
            
            // 為每個圖片添加點擊事件
            pdfImages.forEach((img, index) => {
                img.addEventListener('click', function() {
                    openPdfModal(index);
                });
            });
        }
        
        // 打開模態框
        function openPdfModal(pageIndex) {
            const modal = document.getElementById('pdfModal');
            const modalImage = document.getElementById('pdfModalImage');
            
            if (modalPdfPages.length === 0) return;
            
            modalCurrentPageIndex = pageIndex;
            modalImage.src = modalPdfPages[pageIndex].src;
            modal.classList.add('active');
            
            updateModalPageInfo();
            
            // 防止背景滾動
            document.body.style.overflow = 'hidden';
        }
        
        // 關閉模態框
        function closePdfModal() {
            const modal = document.getElementById('pdfModal');
            modal.classList.remove('active');
            document.body.style.overflow = 'auto';
        }
        
        // 上一頁
        function previousModalPage() {
            if (modalCurrentPageIndex > 0) {
                modalCurrentPageIndex--;
                updateModalImage();
            }
        }
        
        // 下一頁
        function nextModalPage() {
            if (modalCurrentPageIndex < modalPdfPages.length - 1) {
                modalCurrentPageIndex++;
                updateModalImage();
            }
        }
        
        // 更新模態框圖片
        function updateModalImage() {
            const modalImage = document.getElementById('pdfModalImage');
            modalImage.src = modalPdfPages[modalCurrentPageIndex].src;
            updateModalPageInfo();
        }
        
        // 更新頁碼信息
        function updateModalPageInfo() {
            document.getElementById('modalCurrentPage').textContent = modalCurrentPageIndex + 1;
            document.getElementById('modalTotalPages').textContent = modalPdfPages.length;
        }
        
        // 鍵盤導航
        document.addEventListener('keydown', function(e) {
            const modal = document.getElementById('pdfModal');
            if (!modal.classList.contains('active')) return;
            
            if (e.key === 'Escape') {
                closePdfModal();
            } else if (e.key === 'ArrowLeft') {
                previousModalPage();
            } else if (e.key === 'ArrowRight') {
                nextModalPage();
            }
        });
        
        // 點擊背景關閉
        document.getElementById('pdfModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closePdfModal();
            }
        });
        
        // 延遲初始化，等待 PDF 加載完成
        setTimeout(() => {
            initPdfZoom();
        }, 2000);
        
        // 監聽 PDF 加載完成事件（如果有）
        window.addEventListener('pdfLoaded', function() {
            setTimeout(() => {
                initPdfZoom();
            }, 500);
        });
        
        // 🔄 關閉 Export 菜單
        window.closeExportMenu = function() {
            const menu = document.getElementById('exportMenu');
            const overlay = document.getElementById('exportMenuOverlay');
            if (menu) {
                menu.style.display = 'none';
            }
            if (overlay) {
                overlay.style.display = 'none';
            }
        };
        
        // 🔄 動態生成 Export 菜單（根據文檔類型）
        window.toggleExportMenu = function() {
            const menu = document.getElementById('exportMenu');
            const overlay = document.getElementById('exportMenuOverlay');
            if (!menu) return;
            
            // 如果菜單已顯示，則關閉
            if (menu.style.display === 'block') {
                closeExportMenu();
                return;
            }
            
            // 🔧 總是顯示背景遮罩（CSS會控制桌面版隱藏）
            if (!overlay) {
                const newOverlay = document.createElement('div');
                newOverlay.id = 'exportMenuOverlay';
                newOverlay.onclick = closeExportMenu;
                document.body.appendChild(newOverlay);
            }
            if (overlay) {
                overlay.style.display = 'block';
            }
            
            // 根據文檔類型生成菜單
            updateExportMenuForDocumentDetail();
            
            // 顯示菜單（CSS會自動處理桌面版和手機版的不同樣式）
            menu.style.display = 'block';
            console.log('📤 Export 菜單已顯示');
        };

    <!-- 🔥 手機側邊欄功能 -->
    <script>
        // 打開側邊欄
        function openMobileSidebar() {
            const sidebar = document.getElementById('mobile-sidebar');
            const overlay = document.getElementById('mobile-sidebar-overlay');
            if (sidebar && overlay) {
                sidebar.style.left = '0';
                overlay.style.display = 'block';
                document.body.style.overflow = 'hidden';
            }
        }
        
        // 關閉側邊欄
        function closeMobileSidebar() {
            const sidebar = document.getElementById('mobile-sidebar');
            const overlay = document.getElementById('mobile-sidebar-overlay');
            if (sidebar && overlay) {
                sidebar.style.left = '-100%';
                overlay.style.display = 'none';
                document.body.style.overflow = 'auto';
            }
        }
    </script>
