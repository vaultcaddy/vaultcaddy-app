<!-- 🔒 頁面保護：立即隱藏內容，等待 Auth 檢查 -->
<style>
        /* 頁面加載時隱藏內容 */
        body.auth-checking {
            visibility: hidden !important;
        }
        
        /* 顯示加載動畫 */
        .auth-loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999999 !important; /* ✅ 超高z-index确保显示在最上层 */
            visibility: visible !important;
            pointer-events: auto !important;
        }
        
        body.auth-ready .auth-loading {
            display: none;
        }
        
        /* ✅ 确保 auth-ready 时页面可见 */
        body.auth-ready {
            visibility: visible !important;
        }
        
        html.auth-ready {
            visibility: visible !important;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
<script>
        // 立即添加 auth-checking 類，防止未登入用戶看到內容
        document.documentElement.classList.add('auth-checking');
        if (document.body) {
            document.body.classList.add('auth-checking');
        } else {
            document.addEventListener('DOMContentLoaded', function() {
                document.body.classList.add('auth-checking');
            });
        }
        
        // ✅ 安全超时：3秒后强制显示页面（防止卡在认证检查）
        setTimeout(function() {
            logger.log('⏰ 认证超时保护：强制显示页面');
            logger.log('   - 当前body类:', document.body ? document.body.className : 'body不存在');
            logger.log('   - 当前html类:', document.documentElement.className);
            
            document.documentElement.classList.remove('auth-checking');
            document.documentElement.classList.add('auth-ready');
            if (document.body) {
                document.body.classList.remove('auth-checking');
                document.body.classList.add('auth-ready');
                document.body.style.visibility = 'visible';
                document.body.style.overflow = 'auto';
            }
            
            // 隐藏加载动画
            const authLoading = document.querySelector('.auth-loading');
            if (authLoading) {
                authLoading.style.display = 'none';
                logger.log('   - 已隐藏auth-loading');
            }
            
            logger.log('   ✅ 超时保护完成');
        }, 3000); // 3秒超时保护
    </script>

<script>
        // 打開創建項目模態框
        function openCreateProjectModal() {
            const modal = document.getElementById('createProjectModal');
            modal.classList.add('active');
            
            // 自動設置為當前年月
            const now = new Date();
            const currentYear = now.getFullYear().toString();
            const currentMonth = (now.getMonth() + 1).toString().padStart(2, '0');
            
            const yearSelect = document.getElementById('projectYear');
            const monthSelect = document.getElementById('projectMonth');
            
            if (yearSelect && [...yearSelect.options].some(o => o.value === currentYear)) {
                yearSelect.value = currentYear;
            }
            if (monthSelect) {
                monthSelect.value = currentMonth;
            }
        }

        // 關閉創建項目模態框
        function closeCreateProjectModal() {
            const modal = document.getElementById('createProjectModal');
            modal.classList.remove('active');
        }

        // 點擊模態框外部關閉
        window.addEventListener('click', function(event) {
            const createModal = document.getElementById('createProjectModal');
            const qrModal = document.getElementById('qrCodeModal');
            if (event.target === createModal) {
                closeCreateProjectModal();
            }
            if (event.target === qrModal) {
                closeQrCodeModal();
            }
        });

        // QR Code 模態框功能
        function openQrCodeModal() {
            const modal = document.getElementById('qrCodeModal');
            const qrImage = document.getElementById('qrcode-image');
            const qrLoading = document.getElementById('qrcode-loading');
            const linkInput = document.getElementById('upload-link-input');
            
            // 獲取當前用戶 UID
            const user = firebase.auth().currentUser;
            if (!user) {
                alert('請先登入！');
                return;
            }
            
            // 生成專屬上傳連結
            const baseUrl = window.location.origin;
            const uploadUrl = `${baseUrl}/staff-upload.html?shopId=${user.uid}`;
            
            // 設置輸入框 (已移除，改為直接複製)
            // linkInput.value = uploadUrl;
            
            // 顯示模態框
            modal.classList.add('active');
            
            // 顯示加載中
            qrImage.style.display = 'none';
            qrLoading.style.display = 'block';
            
            // 使用 api.qrserver.com 生成 QR Code
            const qrApiUrl = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(uploadUrl)}`;
            
            // 預加載圖片
            const img = new Image();
            img.onload = function() {
                qrImage.src = qrApiUrl;
                qrLoading.style.display = 'none';
                qrImage.style.display = 'block';
            };
            img.onerror = function() {
                qrLoading.textContent = '生成失敗，請重試';
            };
            img.src = qrApiUrl;
        }

        function closeQrCodeModal() {
            const modal = document.getElementById('qrCodeModal');
            modal.classList.remove('active');
        }

        function copyUploadLink() {
            // 由於我們移除了輸入框，現在直接複製變量
            const user = firebase.auth().currentUser;
            if (!user) return;
            const baseUrl = window.location.origin;
            const uploadUrl = `${baseUrl}/staff-upload.html?shopId=${user.uid}`;
            
            navigator.clipboard.writeText(uploadUrl).then(() => {
                const btn = document.querySelector('button[onclick="copyUploadLink()"]');
                const originalText = btn.innerHTML;
                btn.innerHTML = '<i class="fas fa-check"></i> 已複製';
                btn.style.background = '#10B981';
                btn.style.color = 'white';
                btn.style.borderColor = '#10B981';
                
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.style.background = '#F3F4F6';
                    btn.style.color = '#374151';
                    btn.style.borderColor = '#D1D5DB';
                }, 2000);
            }).catch(err => {
                alert('複製失敗，請手動複製連結');
            });
        }

        function downloadQrCode() {
            const qrImage = document.getElementById('qrcode-image');
            if (qrImage && qrImage.src) {
                // 為了避免跨域污染，我們使用 fetch 獲取圖片 Blob
                fetch(qrImage.src)
                    .then(response => response.blob())
                    .then(blob => {
                        const url = window.URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.style.display = 'none';
                        a.href = url;
                        a.download = 'VaultCaddy_Staff_Upload_QRCode.png';
                        document.body.appendChild(a);
                        a.click();
                        window.URL.revokeObjectURL(url);
                        document.body.removeChild(a);
                    })
                    .catch(() => alert('下載失敗，請嘗試右鍵另存圖片'));
            }
        }

        // 創建新項目
        async function createProject() {
            const yearSelect = document.getElementById('projectYear');
            const monthSelect = document.getElementById('projectMonth');
            const projectName = `${yearSelect.value}-${monthSelect.value}`;
            
            if (!projectName) {
                alert('請選擇年份和月份');
                return;
            }
            
            // 保存到 Firebase
            try {
                const projectData = await window.simpleDataManager.createProject(projectName);
                logger.log('✅ 項目已保存到 Firebase:', projectData);
                
                // 關閉模態框
                closeCreateProjectModal();
                
                // 🔥 修復：使用 Firebase 返回的真實 projectId
                const projectId = projectData.id;
                logger.log('🚀 跳轉到新項目頁面:', projectId);
                
                // 跳轉到新項目頁面
                window.location.href = `firstproject.html?project=${projectId}`;
            } catch (error) {
                console.error('❌ 保存到 Firebase 失敗:', error);
                alert(error.message || '創建項目失敗，請重試');
                return;
            }
        }

        // ✅ 簡化：直接使用 SimpleAuth
        function checkLoginStatus() {
            return window.simpleAuth && window.simpleAuth.isLoggedIn();
        }

        // 輔助函數：Base64 轉 File 對象
        function base64ToFile(base64Data, filename) {
            const arr = base64Data.split(',');
            const mime = arr[0].match(/:(.*?);/)[1];
            const bstr = atob(arr[1]);
            let n = bstr.length;
            const u8arr = new Uint8Array(n);
            while (n--) {
                u8arr[n] = bstr.charCodeAt(n);
            }
            return new File([u8arr], filename, { type: mime });
        }

        // 檢查並處理店員上傳的單據
        async function checkStaffUploads() {
            try {
                const user = firebase.auth().currentUser;
                if (!user) return;
                
                const db = firebase.firestore();
                const uploadsRef = db.collection('users').doc(user.uid).collection('staff_uploads');
                const snapshot = await uploadsRef.where('status', '==', 'pending').get();
                
                if (snapshot.empty) {
                    return; // 沒有待處理的單據
                }
                
                console.log(`📦 發現 ${snapshot.size} 張店員上傳的單據，準備處理...`);
                
                // 顯示處理中提示
                const processingBanner = document.createElement('div');
                processingBanner.id = 'staff-processing-banner';
                processingBanner.style.cssText = 'position: fixed; top: 70px; left: 50%; transform: translateX(-50%); background: #4F46E5; color: white; padding: 10px 20px; border-radius: 8px; z-index: 9999; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: flex; align-items: center; gap: 10px; font-weight: 500;';
                processingBanner.innerHTML = `<i class="fas fa-spinner fa-spin"></i> 正在處理 ${snapshot.size} 張店員上傳的單據...`;
                document.body.appendChild(processingBanner);
                
                const processor = new QwenVLMaxProcessor();
                let processedCount = 0;
                
                for (const doc of snapshot.docs) {
                    try {
                        const data = doc.data();
                        console.log(`⚙️ 正在處理單據: ${doc.id}`);
                        
                        // 1. AI 辨識
                        const aiResult = await processor.processBase64Document(data.imageBase64, 'invoice');
                        const extractedData = aiResult.data;
                        
                        // 2. 獲取日期並決定月份 (格式: YYYY-MM)
                        let targetMonth = '';
                        if (extractedData && extractedData.date) {
                            // 嘗試解析日期
                            const dateMatch = extractedData.date.match(/^(\d{4})[-\/](\d{1,2})/);
                            if (dateMatch) {
                                const year = dateMatch[1];
                                const month = dateMatch[2].padStart(2, '0');
                                targetMonth = `${year}-${month}`;
                            }
                        }
                        
                        // 如果無法獲取日期，使用當前月份
                        if (!targetMonth) {
                            const now = new Date();
                            targetMonth = `${now.getFullYear()}-${(now.getMonth() + 1).toString().padStart(2, '0')}`;
                        }
                        
                        // 3. 確保項目(月份)存在
                        const projects = await window.simpleDataManager.getProjects();
                        let targetProject = projects.find(p => p.name === targetMonth);
                        
                        if (!targetProject) {
                            console.log(`📁 創建新月份資料夾: ${targetMonth}`);
                            targetProject = await window.simpleDataManager.createProject(targetMonth);
                        }
                        
                        // 4. 上傳圖片到 Firebase Storage
                        const fileName = data.fileName || `Staff_Upload_${Date.now()}.jpg`;
                        const fileObj = base64ToFile(data.imageBase64, fileName);
                        const fileUrl = await window.simpleDataManager.uploadFile(targetProject.id, fileObj);
                        
                        // 5. 儲存單據到該項目
                        const documentData = {
                            fileName: fileName,
                            fileType: 'image/jpeg',
                            fileUrl: fileUrl, // 使用 Storage URL 而不是 Base64
                            uploadDate: firebase.firestore.FieldValue.serverTimestamp(),
                            status: 'completed',
                            processedData: extractedData,
                            rawText: aiResult.rawText,
                            source: 'staff_upload'
                        };
                        
                        await window.simpleDataManager.createDocument(targetProject.id, documentData);
                        
                        // 6. 標記為已處理並清理 Base64 數據以節省空間
                        await uploadsRef.doc(doc.id).update({
                            status: 'processed',
                            processedAt: firebase.firestore.FieldValue.serverTimestamp(),
                            projectId: targetProject.id,
                            imageBase64: firebase.firestore.FieldValue.delete() // 刪除 Base64 數據
                        });
                        
                        processedCount++;
                        processingBanner.innerHTML = `<i class="fas fa-spinner fa-spin"></i> 正在處理店員上傳... (${processedCount}/${snapshot.size})`;
                        
                    } catch (err) {
                        console.error(`❌ 處理單據 ${doc.id} 失敗:`, err);
                        // 標記為失敗
                        await uploadsRef.doc(doc.id).update({
                            status: 'failed',
                            error: err.message || '處理失敗'
                        });
                    }
                }
                
                // 處理完成
                processingBanner.style.background = '#10B981';
                processingBanner.innerHTML = `<i class="fas fa-check-circle"></i> 成功處理 ${processedCount} 張單據！`;
                
                // 重新載入項目列表以更新 UI
                loadProjects();
                
                setTimeout(() => {
                    processingBanner.remove();
                }, 3000);
                
            } catch (error) {
                console.error('❌ 檢查店員上傳失敗:', error);
            }
        }

        // 載入項目列表
        async function loadProjects() {
            logger.log('🔄 載入項目列表');
            
            // 從 Firebase 獲取項目數據
            let projects = [];
            let totalDocs = 0;
            let totalTax = 0;
            
            try {
                projects = await window.simpleDataManager.getProjects();
                logger.log(`✅ 從 Firebase 加載 ${projects.length} 個項目`);
                
                // 找出當前月份的項目 ID，供匯出按鈕使用
                const now = new Date();
                const currentMonthName = `${now.getFullYear()}-${(now.getMonth() + 1).toString().padStart(2, '0')}`;
                const currentProject = projects.find(p => p.name === currentMonthName);
                if (currentProject) {
                    window.currentMonthProjectId = currentProject.id;
                } else {
                    window.currentMonthProjectId = null;
                }
                
                // 計算總數據
                for (const project of projects) {
                    // 獲取每個項目的文檔來計算總扣稅額和真實單據數量
                    try {
                        const docs = await window.simpleDataManager.getDocuments(project.id);
                        
                        // 更新項目的真實單據數量
                        project.documentCount = docs.length;
                        totalDocs += docs.length;
                        
                        for (const doc of docs) {
                            if (doc.processedData && doc.processedData.tax_deductibility) {
                                const level = doc.processedData.tax_deductibility.level;
                                const amount = parseFloat(doc.processedData.total_amount || doc.processedData.total || doc.processedData.totalAmount || 0);
                                
                                if (!isNaN(amount)) {
                                    if (level === 'High') {
                                        totalTax += amount;
                                    } else if (level === 'Medium') {
                                        totalTax += amount * 0.5; // 假設 Medium 算 50%
                                    }
                                }
                            }
                        }
                    } catch (e) {
                        console.error(`無法獲取項目 ${project.id} 的文檔:`, e);
                    }
                }
                
                // 更新頂部卡片
                document.getElementById('dashboard-total-docs').textContent = totalDocs;
                
                // 格式化總金額 (顯示小數點後2位)
                const formattedTax = new Intl.NumberFormat('en-US', {
                    minimumFractionDigits: 2,
                    maximumFractionDigits: 2
                }).format(totalTax);
                document.getElementById('dashboard-total-tax').textContent = formattedTax;
                
            } catch (error) {
                console.error('❌ 從 Firebase 加載項目失敗:', error);
                projects = [];
            }
            
            const tbody = document.getElementById('projects-tbody');
            
            if (projects.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="4">
                            <div class="empty-state" style="padding: 3rem 1rem; text-align: center; background: #F9FAFB; border-radius: 12px; border: 2px dashed #E5E7EB; position: relative;">
                                <div style="position: absolute; top: -30px; right: 20px; animation: bounce 2s infinite;">
                                    <div style="background: #10B981; color: white; padding: 8px 16px; border-radius: 20px; font-weight: bold; font-size: 0.9rem; box-shadow: 0 4px 6px rgba(16, 185, 129, 0.2);">
                                        👉 第一步：點擊右上角獲取店員上傳 QR Code
                                    </div>
                                    <div style="width: 0; height: 0; border-left: 10px solid transparent; border-right: 10px solid transparent; border-top: 10px solid #10B981; margin: 0 auto;"></div>
                                </div>
                                <i class="fas fa-calendar-plus" style="font-size: 3rem; color: #d1d5db; margin-bottom: 1rem;"></i>
                                <h3 style="font-size: 1.25rem; color: #374151; margin-bottom: 0.5rem;">尚未建立任何月份</h3>
                                <p style="color: #6b7280; margin-bottom: 1.5rem;">點擊上方按鈕新增一個帳單月份，或直接讓店員掃描 QR Code 上傳，系統會自動為您建立！</p>
                                <button onclick="openCreateProjectModal()" style="background: #4F46E5; color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 6px; font-weight: 600; cursor: pointer; transition: background 0.2s;" onmouseover="this.style.background='#4338CA'" onmouseout="this.style.background='#4F46E5'">
                                    <i class="fas fa-plus" style="margin-right: 0.5rem;"></i> 手動新增月份
                                </button>
                            </div>
                            <style>
                                @keyframes bounce {
                                    0%, 100% { transform: translateY(0); }
                                    50% { transform: translateY(-10px); }
                                }
                            </style>
                        </td>
                    </tr>
                `;
                return;
            }
            
            tbody.innerHTML = projects.map(project => `
                <tr onclick="window.location.href='firstproject.html?project=${project.id}'" style="cursor: pointer; transition: background 0.2s;" onmouseover="this.style.background='#f9fafb'" onmouseout="this.style.background='transparent'">
                    <td style="font-weight: 600; color: #1F2937; padding: 1rem;">
                        <i class="fas fa-folder" style="color: #4F46E5; margin-right: 8px;"></i>
                        ${project.name}
                    </td>
                    <td style="padding: 1rem; color: #4B5563;">
                        <i class="fas fa-receipt" style="color: #9CA3AF; margin-right: 4px;"></i> 
                        ${project.documentCount || 0} 張
                    </td>
                    <td style="padding: 1rem;">
                        <span style="background: #DEF7EC; color: #046C4E; padding: 4px 8px; border-radius: 12px; font-size: 0.75rem; font-weight: 600;">收集中</span>
                    </td>
                    <td style="text-align: center; padding: 1rem;">
                        <button 
                            onclick="event.stopPropagation(); showDeleteProjectModal('${project.id}', '${project.name.replace(/'/g, "\\'")}')" 
                            style="background: none; border: none; color: #9ca3af; cursor: pointer; padding: 0.5rem; border-radius: 4px; transition: all 0.2s;"
                            onmouseover="this.style.color='#ef4444'; this.style.backgroundColor='#fee2e2'"
                            onmouseout="this.style.color='#9ca3af'; this.style.backgroundColor='transparent'"
                            title="刪除月份"
                        >
                            <i class="fas fa-trash" style="font-size: 1rem;"></i>

        }

        // 格式化日期
        function formatDate(dateValue) {
            if (!dateValue) return '-';
            
            let date;
            
            // 處理 Firebase Timestamp 對象
            if (typeof dateValue === 'object' && dateValue.seconds) {
                // 檢查 seconds 是否為有效值（不為 0 或負數）
                if (dateValue.seconds <= 0) {
                    logger.warn('⚠️ 無效的 Firebase Timestamp:', dateValue);
                    return '-';
                }
                date = new Date(dateValue.seconds * 1000);
            } 
            // 處理 Date 對象
            else if (dateValue instanceof Date) {
                date = dateValue;
            }
            // 處理數字時間戳
            else if (typeof dateValue === 'number') {
                // 檢查時間戳是否為有效值
                if (dateValue <= 0) {
                    logger.warn('⚠️ 無效的時間戳:', dateValue);
                    return '-';
                }
                date = new Date(dateValue);
            }
            // 處理字符串
            else if (typeof dateValue === 'string') {
                date = new Date(dateValue);
            }
            else {
                logger.warn('⚠️ 未知的日期格式:', dateValue);
                return '-';
            }
            
            // 檢查日期是否有效
            if (isNaN(date.getTime()) || date.getTime() <= 0) {
                logger.warn('⚠️ 無效的日期:', date);
                return '-';
            }
            
            // 返回格式化的日期
            return date.toLocaleDateString('zh-TW', { 
                year: 'numeric', 
                month: '2-digit', 
                day: '2-digit' 
            });
        }

        // ==================== 刪除項目模態框 ====================
        let projectToDelete = null;

        function showDeleteProjectModal(projectId, projectName) {
            projectToDelete = { id: projectId, name: projectName };
            const modal = document.getElementById('deleteProjectModal');
            const nameDisplay = document.getElementById('deleteProjectName');
            const confirmInput = document.getElementById('deleteProjectConfirmInput');
            const confirmBtn = document.getElementById('confirmDeleteBtn');
            
            nameDisplay.textContent = projectName;
            confirmInput.value = '';
            confirmBtn.disabled = true;
            modal.style.display = 'flex';
            
            setTimeout(() => confirmInput.focus(), 100);
        }

        function closeDeleteProjectModal() {
            const modal = document.getElementById('deleteProjectModal');
            modal.style.display = 'none';
            projectToDelete = null;
        }

        function validateDeleteInput() {
            const confirmInput = document.getElementById('deleteProjectConfirmInput');
            const confirmBtn = document.getElementById('confirmDeleteBtn');
            
            if (projectToDelete && confirmInput.value === projectToDelete.name) {
                confirmBtn.disabled = false;
                confirmBtn.style.opacity = '1';
                confirmBtn.style.cursor = 'pointer';
            } else {
                confirmBtn.disabled = true;
                confirmBtn.style.opacity = '0.5';
                confirmBtn.style.cursor = 'not-allowed';
            }
        }

        async function confirmDeleteProject() {
            if (!projectToDelete) return;
            
            try {
                await window.simpleDataManager.deleteProject(projectToDelete.id);
                logger.log('✅ 項目已刪除:', projectToDelete.name);
                
                // 觸發側邊欄更新
                window.dispatchEvent(new Event('projectDeleted'));
                
                // 關閉模態框
                closeDeleteProjectModal();
                
                // 重新加載項目列表
                loadProjects();
                
                alert('項目已成功刪除');
            } catch (error) {
                console.error('❌ 刪除項目失敗:', error);
                alert('刪除項目失敗: ' + error.message);
            }
        }

        // 初始化示例項目函數已移除 - 新用戶應該看到空白項目列表
        // function initializeSampleProjects() {
        //     新用戶註冊時不應該有任何預設項目
        // }

        // 🔥 監聽 SimpleAuth 初始化完成事件
        let authInitialized = false;
        let dataManagerInitialized = false;
        
        window.addEventListener('auth-state-changed', async function(e) {
            logger.log('🔥 收到 auth-state-changed 事件');
            authInitialized = true;
            
            // 檢查是否已登入
            if (!e.detail.user) {
                logger.log('❌ 用戶未登入');
                return; // SimpleAuth 會自動處理重定向
            }
            
            logger.log('✅ 用戶已登入:', e.detail.user.email);
            
            // 初始化側邊欄
            initializeDashboard();
        });
        
        // 初始化 Dashboard
        function initializeDashboard() {
            logger.log('🎯 初始化 Dashboard...');
            
            // 初始化側邊欄
            if (window.VaultCaddySidebar && !window.dashboardSidebar) {
                window.dashboardSidebar = new VaultCaddySidebar('dashboard');
                logger.log('✅ 側邊欄已初始化');
            }
            
            // 如果 SimpleDataManager 已初始化，載入項目
            if (window.simpleDataManager && window.simpleDataManager.initialized) {
                logger.log('✅ SimpleDataManager 已就緒，載入項目');
                loadProjects();
                checkStaffUploads(); // 檢查店員上傳
            }
        }
        
        // 監聽 SimpleDataManager 初始化完成
        // （通過輪詢檢查，因為 simple-data-manager.js 沒有觸發專用事件）
        const checkDataManager = setInterval(() => {
            if (window.simpleDataManager && window.simpleDataManager.initialized && !dataManagerInitialized) {
                dataManagerInitialized = true;
                clearInterval(checkDataManager);
                logger.log('✅ SimpleDataManager 已初始化');
                
                // 如果用戶已登入，載入項目
                if (authInitialized && window.simpleAuth && window.simpleAuth.isLoggedIn()) {
                    logger.log('✅ 用戶已登入 + SimpleDataManager 已就緒，載入項目');
                    loadProjects();
                }
            }
        }, 100);
        
        // 超時保護（15 秒）
        setTimeout(() => {
            clearInterval(checkDataManager);
            if (!dataManagerInitialized) {
                console.error('❌ SimpleDataManager 初始化超時');
            }
        }, 15000);
        
        // ==================== Email 驗證檢查 ====================
        (async function initEmailVerification() {
            try {
                // 等待 Firebase 和驗證檢查器初始化
                await new Promise((resolve) => {
                    const checkReady = setInterval(() => {
                        if (window.emailVerificationChecker && firebase.auth) {
                            clearInterval(checkReady);
                            resolve();
                        }
                    }, 100);
                    
                    setTimeout(() => {
                        clearInterval(checkReady);
                        resolve();
                    }, 10000);
                });
                
                // 檢查驗證狀態並顯示提示（不阻擋功能）
                await checkEmailVerification({ showNotice: true, blockPage: false });
            } catch (error) {
                console.error('❌ Email 驗證檢查失敗:', error);
            }
        })();
    </script>
<!-- 🔥 漢堡菜單超級簡單修復方案 -->
<script>
        logger.log('🔥 開始初始化漢堡菜單...');
        
        // 打開側邊欄函數
        function openSidebar() {
            logger.log('🔵 打開側邊欄');
            const sidebar = document.getElementById('mobile-sidebar');
            const overlay = document.getElementById('mobile-sidebar-overlay');
            
            if (sidebar && overlay) {
                sidebar.style.left = '0';
                overlay.style.display = 'block';
                overlay.style.pointerEvents = 'auto';
                // 触发重排后再改透明度，确保动画生效
                setTimeout(() => {
                    overlay.style.opacity = '1';
                }, 10);
                document.body.style.overflow = 'hidden';
                logger.log('✅ 側邊欄已打開');
            }
        }
        
        // 關閉側邊欄函數
        function closeSidebar() {
            logger.log('🔵 關閉側邊欄');
            const sidebar = document.getElementById('mobile-sidebar');
            const overlay = document.getElementById('mobile-sidebar-overlay');
            
            if (sidebar && overlay) {
                sidebar.style.left = '-100%';
                overlay.style.opacity = '0';
                overlay.style.pointerEvents = 'none';
                setTimeout(() => {
                    overlay.style.display = 'none';
                }, 300); // 等待動畫完成（與 CSS transition 一致）
                document.body.style.overflow = 'auto';
                logger.log('✅ 側邊欄已關閉');
            }
        }
        
        // 超級簡單的初始化函數
        function simpleInitMenu() {
            const btn = document.getElementById('mobile-menu-btn');
            const overlay = document.getElementById('mobile-sidebar-overlay');
            
            if (!btn || !overlay) {
                logger.log('⏳ 元素未找到，200ms後重試');
                setTimeout(simpleInitMenu, 200);
                return;
            }
            
            // ✅ 确保遮罩初始状态是隐藏的
            overlay.style.display = 'none';
            overlay.style.opacity = '0';
            overlay.style.pointerEvents = 'none';
            
            // ✅ 确保认证加载动画已隐藏
            const authLoading = document.querySelector('.auth-loading');
            if (authLoading) {
                authLoading.style.display = 'none';
            }
            
            // ✅ 确保 body 有 auth-ready 类
            document.body.classList.add('auth-ready');
            document.body.classList.remove('auth-checking');
            document.documentElement.classList.add('auth-ready');
            document.documentElement.classList.remove('auth-checking');
            
            logger.log('✅ 找到所有元素！');
            
            // 按鈕點擊處理
            btn.addEventListener('click', function() {
                logger.log('🔵 按鈕被點擊！');
                openSidebar();
            });
            
            // 觸摸處理
            btn.addEventListener('touchend', function(e) {
                e.preventDefault();
                logger.log('🔵 觸摸事件！');
                openSidebar();
            });
            
            // 遮罩點擊關閉
            overlay.addEventListener('click', function() {
                logger.log('🔵 點擊遮罩關閉');
                closeSidebar();
            });
            
            // 遮罩觸摸關閉
            overlay.addEventListener('touchend', function(e) {
                e.preventDefault();
                logger.log('🔵 觸摸遮罩關閉');
                closeSidebar();
            });
            
            logger.log('✅ 所有事件監聽器已綁定');
        }
        
        // 立即嘗試初始化
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', simpleInitMenu);
        } else {
            setTimeout(simpleInitMenu, 100);
        }
        
        // ✅ 紧急修复：页面加载后立即执行（不等待load事件）
        function emergencyOverlayCleanup() {
            logger.log('🔧 执行紧急遮罩清理...');
            
            // 隐藏所有可能的遮罩层
            const overlays = [
                document.getElementById('mobile-sidebar-overlay'),
                document.querySelector('.auth-loading'),
                document.querySelector('.modal-overlay'),
                document.getElementById('deleteProjectModal')
            ];
            
            overlays.forEach(overlay => {
                if (overlay) {
                    overlay.style.display = 'none';
                    overlay.style.opacity = '0';
                    overlay.style.pointerEvents = 'none';
                }
            });
            
            // 确保 body 可见
            document.body.classList.add('auth-ready');
            document.body.classList.remove('auth-checking');
            document.documentElement.classList.add('auth-ready');
            document.documentElement.classList.remove('auth-checking');
            document.body.style.visibility = 'visible';
            document.body.style.overflow = 'auto';
            
            logger.log('✅ 遮罩清理完成');
        }
        
        // 立即执行一次
        setTimeout(emergencyOverlayCleanup, 1000); // 1秒后强制清理
        
        // load事件也执行一次
        window.addEventListener('load', emergencyOverlayCleanup);
        
        // DOMContentLoaded也执行一次
        document.addEventListener('DOMContentLoaded', emergencyOverlayCleanup);
        
        // 暴露函數供側邊欄內的連結使用
        window.closeMobileSidebar = closeSidebar;
    </script>
