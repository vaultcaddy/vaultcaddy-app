<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="alternate icon" type="image/png" href="favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>語言選擇器測試</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 2rem;
            background: #f3f4f6;
        }
        .test-container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 {
            color: #1f2937;
            margin-bottom: 1rem;
        }
        .info {
            background: #eff6ff;
            border-left: 4px solid #3b82f6;
            padding: 1rem;
            margin: 1rem 0;
        }
        .test-section {
            margin: 2rem 0;
            padding: 1rem;
            border: 1px solid #e5e7eb;
            border-radius: 4px;
        }
        #status {
            padding: 1rem;
            margin: 1rem 0;
            border-radius: 4px;
        }
        .success { background: #d1fae5; color: #065f46; }
        .error { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>
    <div class="test-container">
        <h1>🌐 VaultCaddy 语言选择器测试</h1>
        
        <div class="info">
            <strong>测试目的</strong>: 验证语言选择器是否正确加载和显示
        </div>
        
        <div class="test-section">
            <h3>语言选择器位置:</h3>
            <div id="language-switcher" style="display: none !important;"></div>
        </div>
        
        <div class="test-section">
            <h3>诊断信息:</h3>
            <div id="status">等待加载...</div>
        </div>
        
        <div class="test-section">
            <h3>JavaScript 控制台日志:</h3>
            <p>打开浏览器开发者工具（F12）查看详细日志</p>
        </div>
    </div>
    
    <script src="multilingual-data-sync.js"></script>
    <script>
        // 诊断脚本
        setTimeout(() => {
            const statusDiv = document.getElementById('status');
            const checks = [];
            
            // 检查1: 脚本是否加载
            if (window.multilingualSync) {
                checks.push('✅ multilingual-data-sync.js 已加载');
            } else {
                checks.push('❌ multilingual-data-sync.js 未加载');
            }
            
            // 检查2: 容器是否存在
            const container = document.getElementById('language-switcher');
            if (container) {
                checks.push('✅ 语言选择器容器存在');
            } else {
                checks.push('❌ 语言选择器容器不存在');
            }
            
            // 检查3: 内容是否渲染
            if (container && container.innerHTML.trim() !== '') {
                checks.push('✅ 语言选择器已渲染');
                checks.push('内容: ' + container.innerHTML.substring(0, 100) + '...');
            } else {
                checks.push('❌ 语言选择器未渲染（容器为空）');
            }
            
            // 检查4: 当前语言
            if (window.multilingualSync) {
                checks.push(`当前语言: ${window.multilingualSync.currentLang}`);
            }
            
            // 显示结果
            const hasErrors = checks.some(c => c.startsWith('❌'));
            statusDiv.className = hasErrors ? 'error' : 'success';
            statusDiv.innerHTML = checks.join('<br>');
        }, 1000);
    </script>

    <!-- Google Analytics 事件跟踪 -->
    <script src="/ga-event-tracking.js"></script>
</body>
</html>
