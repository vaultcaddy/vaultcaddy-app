    <!-- 🔒 頁面保護 -->
    <style>
        body.auth-checking { visibility: hidden !important; }
        .auth-loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: flex; align-items: center; justify-content: center; z-index: 10000; visibility: visible !important; }
        body.auth-ready .auth-loading { display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
    <script>
        document.documentElement.classList.add('auth-checking');
        if (document.body) { document.body.classList.add('auth-checking'); } 
        else { document.addEventListener('DOMContentLoaded', function() { document.body.classList.add('auth-checking'); }); }
        
        // ✅ 超時保護：10秒後強制顯示頁面（防止卡住）
        setTimeout(function() {
            if (document.body.classList.contains('auth-checking')) {
                console.warn('⚠️ Auth 初始化超時（10秒），強制顯示頁面');
                document.body.classList.remove('auth-checking');
                document.body.classList.add('auth-ready');
                
                // 如果沒有登入，重定向到首頁
                if (!window.simpleAuth || !window.simpleAuth.currentUser) {
                    console.log('❌ 超時且未登入，重定向到首頁');
                    setTimeout(function() {
                        window.location.href = 'index.html';
                    }, 1000);
                }
            }
        }, 10000);
    </script>

    <!-- ✅ 提前定義 goBackToDashboard 函數 -->
    <script>
        // 返回儀表板（提前定義，避免 ReferenceError）
        function goBackToDashboard() {
            const params = new URLSearchParams(window.location.search);
            const projectId = params.get('project');
            if (projectId) {
                window.location.href = `firstproject.html?project=${projectId}`;
            } else {
                window.location.href = 'dashboard.html';
            }
        }
        
        // 🔥 刪除當前文檔（使用與 firstproject.html 相同的方法）
        async function deleteCurrentDocument() {
            const confirmDelete = confirm('確定要刪除此文檔嗎？此操作無法撤銷。');
            if (!confirmDelete) return;
            
            try {
                const params = new URLSearchParams(window.location.search);
                const projectId = params.get('project');
                const documentId = params.get('id');
                
                if (!projectId || !documentId) {
                    alert('無法獲取文檔信息');
                    return;
                }
                
                console.log('🗑️ 開始刪除文檔:', { projectId, documentId });
                
                // 🔥 使用與 firstproject.html 相同的刪除方法
                if (window.simpleDataManager && typeof window.simpleDataManager.deleteDocument === 'function') {
                    // 方法1：使用 simpleDataManager
                    await window.simpleDataManager.deleteDocument(projectId, documentId);
                    console.log('✅ 文檔已刪除 (simpleDataManager)');
                } else if (firebase && firebase.firestore) {
                    // 方法2：直接使用 Firestore（備用）
                    await firebase.firestore()
                        .collection('projects')
                        .doc(projectId)
                        .collection('documents')
                        .doc(documentId)
                        .delete();
                    console.log('✅ 文檔已刪除 (Firestore)');
                } else {
                    throw new Error('無法連接到數據庫');
                }
                
                alert('文檔已成功刪除');
                
                // 🎯 刪除成功後，返回項目頁面（與 firstproject.html 一致）
                console.log('📍 返回項目頁面:', projectId);
                window.location.href = `firstproject.html?project=${projectId}`;
                
            } catch (error) {
                console.error('❌ 刪除文檔失敗:', error);
                alert('刪除文檔失敗: ' + error.message);
            }
        
        }
    </script>

        let modalCurrentPageIndex = 0;

        // 初始化 PDF 放大功能
        function initPdfZoom() {
            // 獲取所有 PDF 頁面圖片
            const pdfImages = document.querySelectorAll('.pdf-page img');
            modalPdfPages = Array.from(pdfImages);
            
            // 為每個圖片添加點擊事件
            pdfImages.forEach((img, index) => {
                img.addEventListener('click', function() {
                    openPdfModal(index);
                });
            });
        }
        
        // 打開模態框
        function openPdfModal(pageIndex) {
            const modal = document.getElementById('pdfModal');
            const modalImage = document.getElementById('pdfModalImage');
            
            if (modalPdfPages.length === 0) return;
            
            modalCurrentPageIndex = pageIndex;
            modalImage.src = modalPdfPages[pageIndex].src;
            modal.classList.add('active');
            
            updateModalPageInfo();
            
            // 防止背景滾動
            document.body.style.overflow = 'hidden';
        }
        
        // 關閉模態框
        function closePdfModal() {
            const modal = document.getElementById('pdfModal');
            modal.classList.remove('active');
            document.body.style.overflow = 'auto';
        }
        
        // 上一頁
        function previousModalPage() {
            if (modalCurrentPageIndex > 0) {
                modalCurrentPageIndex--;
                updateModalImage();
            }
        }
        
        // 下一頁
        function nextModalPage() {
            if (modalCurrentPageIndex < modalPdfPages.length - 1) {
                modalCurrentPageIndex++;
                updateModalImage();
            }
        }
        
        // 更新模態框圖片

            const modalImage = document.getElementById('pdfModalImage');
            modalImage.src = modalPdfPages[modalCurrentPageIndex].src;

            document.getElementById('modalCurrentPage').textContent = modalCurrentPageIndex + 1;

        // 鍵盤導航
        document.addEventListener('keydown', function(e) {
            const modal = document.getElementById('pdfModal');
            if (!modal.classList.contains('active')) return;
            
            if (e.key === 'Escape') {
                closePdfModal();
            } else if (e.key === 'ArrowLeft') {
                previousModalPage();
            } else if (e.key === 'ArrowRight') {
                nextModalPage();
            }
        });

        // ✅ 生成 QBO 文件内容
        function generateQBOFile(data) {
            console.log('📊 生成 QBO 文件...');
            
            const now = new Date();
            const formatQBODateTime = (date) => {
                const d = new Date(date);
                return d.getFullYear() + 
                       String(d.getMonth() + 1).padStart(2, '0') + 
                       String(d.getDate()).padStart(2, '0') + 
                       String(d.getHours()).padStart(2, '0') + 
                       String(d.getMinutes()).padStart(2, '0') + 
                       String(d.getSeconds()).padStart(2, '0');
            };
            
            const formatQBODate = (dateStr) => {
                if (!dateStr) return formatQBODateTime(now);
                const d = new Date(dateStr);
                if (isNaN(d)) return formatQBODateTime(now);
                return d.getFullYear() + String(d.getMonth() + 1).padStart(2, '0') + String(d.getDate()).padStart(2, '0');
            };
            
            const escapeXML = (str) => {
                if (!str) return '';
                return String(str)
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&apos;');
            };
            
            // 将交易类型映射到 OFX TRNTYPE
            const mapTransactionType = (type) => {
                if (!type) return 'OTHER';
                const t = type.toLowerCase();
                if (t.includes('deposit') || t.includes('存款') || t.includes('入账')) return 'CREDIT';
                if (t.includes('withdraw') || t.includes('提款') || t.includes('转出')) return 'DEBIT';
                if (t.includes('check') || t.includes('支票')) return 'CHECK';
                if (t.includes('atm')) return 'ATM';
                if (t.includes('pos') || t.includes('刷卡')) return 'POS';
                if (t.includes('transfer') || t.includes('转账')) return 'XFER';
                if (t.includes('payment') || t.includes('付款')) return 'PAYMENT';
                if (t.includes('fee') || t.includes('费用')) return 'FEE';
                if (t.includes('interest') || t.includes('利息')) return 'INT';
                return 'OTHER';
            };
            
            // QBO 文件头
            let qbo = `OFXHEADER:100
DATA:OFXSGML
VERSION:102
SECURITY:NONE
ENCODING:USASCII
CHARSET:1252
COMPRESSION:NONE
OLDFILEUID:NONE
NEWFILEUID:NONE

<OFX>
<SIGNONMSGSRSV1>
<SONRS>
<STATUS>
<CODE>0</CODE>
<SEVERITY>INFO</SEVERITY>
</STATUS>
<DTSERVER>${formatQBODateTime(now)}</DTSERVER>
<LANGUAGE>ENG</LANGUAGE>
</SONRS>
</SIGNONMSGSRSV1>
<BANKMSGSRSV1>
<STMTTRNRS>
<TRNUID>1</TRNUID>
<STATUS>
<CODE>0</CODE>
<SEVERITY>INFO</SEVERITY>
</STATUS>
<STMTRS>
<CURDEF>${data.currency || 'HKD'}</CURDEF>
<BANKACCTFROM>
<BANKID>${escapeXML(data.bankCode || data.bankName || '000000000')}</BANKID>
<ACCTID>${escapeXML(data.accountNumber || '123456789')}</ACCTID>
<ACCTTYPE>CHECKING</ACCTTYPE>
</BANKACCTFROM>
<BANKTRANLIST>
<DTSTART>${formatQBODateTime(now)}</DTSTART>
<DTEND>${formatQBODateTime(now)}</DTEND>
`;
            
            // 添加每笔交易
            data.transactions.forEach((tx, index) => {
                const amount = parseFloat(tx.amount || 0);
                const trnType = mapTransactionType(tx.transactionType);
                const payee = escapeXML(tx.payee || tx.description || '');
                const memo = escapeXML(tx.memo || tx.referenceNumber || '');
                
                qbo += `<STMTTRN>
<TRNTYPE>${trnType}</TRNTYPE>
<DTPOSTED>${formatQBODate(tx.date)}</DTPOSTED>
<TRNAMT>${amount.toFixed(2)}</TRNAMT>
<FITID>${index + 1}</FITID>
<NAME>${payee}</NAME>
<MEMO>${memo}</MEMO>
`;
                
                // 如果有支票号码，添加 CHECKNUM 字段
                if (tx.checkNumber) {
                    qbo += `<CHECKNUM>${escapeXML(tx.checkNumber)}</CHECKNUM>\n`;
                }
                
                qbo += `</STMTTRN>
`;
            });
            
            // QBO 文件尾
            qbo += `</BANKTRANLIST>
<LEDGERBAL>
<BALAMT>${parseFloat(data.closingBalance || data.balance || 0).toFixed(2)}</BALAMT>
<DTASOF>${formatQBODateTime(now)}</DTASOF>
</LEDGERBAL>
</STMTRS>
</STMTTRNRS>
</BANKMSGSRSV1>
</OFX>
`;
            
            console.log('✅ QBO 文件生成完成');
            return qbo;
        }
        
        // 导出文档（简化版，适配单文档）
        window.exportDocuments = async function(format) {
            console.log('📤 开始导出:', format);
            
            // 关闭菜单
            closeExportMenu();
            
            // 获取当前文档
            const currentDoc = window.currentDocument;
            if (!currentDoc) {
                alert('文档数据未加载');
                return;
            }
            
            if (currentDoc.status !== 'completed' || !currentDoc.processedData) {
                alert('文档尚未完成处理');
                return;
            }
            
            // 简单的导出逻辑
            try {
                const data = currentDoc.processedData;
                let csv = '';
                let filename = '';
                
                switch(format) {
                    case 'bank_statement_csv':
                        // 标准 CSV (VaultCaddy 格式 - 最详细)
                        if (data.transactions && data.transactions.length > 0) {
                            csv = 'Date,Type,Description,Payee,Reference,Amount,Balance\n';
                            data.transactions.forEach(t => {
                                csv += `"${t.date || ''}","${t.transactionType || ''}","${t.description || ''}","${t.payee || ''}","${t.referenceNumber || ''}","${t.amount || 0}","${t.balance || 0}"\n`;
                            });
                            filename = `BankStatement_${Date.now()}.csv`;
                        }
                        break;
                    
                    case 'universal_csv':
                        // 🌐 通用 CSV (适用于 Xero, Wave, QuickBooks, MYOB)
                        if (data.transactions && data.transactions.length > 0) {
                            csv = 'Date,Type,Description,Payee,Reference,Amount,Balance\n';
                            data.transactions.forEach(t => {
                                // 使用 ISO 8601 日期格式 (YYYY-MM-DD)
                                let isoDate = t.date || '';
                                if (isoDate && !isoDate.match(/^\d{4}-\d{2}-\d{2}$/)) {
                                    // 尝试转换为 ISO 格式
                                    try {
                                        const d = new Date(isoDate);
                                        if (!isNaN(d.getTime())) {
                                            isoDate = d.toISOString().split('T')[0];
                                        }
                                    } catch (e) {
                                        console.warn('日期格式转换失败:', isoDate);
                                    }
                                }
                                csv += `"${isoDate}","${t.transactionType || ''}","${t.description || ''}","${t.payee || ''}","${t.referenceNumber || ''}","${t.amount || 0}","${t.balance || 0}"\n`;
                            });
                            filename = `Universal_BankStatement_${Date.now()}.csv`;
                        }
                        break;
                    
                    case 'sage_csv':
                        // 📄 Sage CSV (英国格式 - 借贷分离)
                        if (data.transactions && data.transactions.length > 0) {
                            csv = 'Date,Type,Account Ref,Description,Debit,Credit,Reference\n';
                            data.transactions.forEach(t => {
                                // 转换为 DD/MM/YYYY 格式
                                let ukDate = t.date || '';
                                if (ukDate) {
                                    try {
                                        const d = new Date(ukDate);
                                        if (!isNaN(d.getTime())) {
                                            const day = String(d.getDate()).padStart(2, '0');
                                            const month = String(d.getMonth() + 1).padStart(2, '0');
                                            const year = d.getFullYear();
                                            ukDate = `${day}/${month}/${year}`;
                                        }
                                    } catch (e) {
                                        console.warn('日期格式转换失败:', ukDate);
                                    }
                                }
                                
                                // 确定交易类型代码
                                const amount = parseFloat(t.amount || 0);
                                const typeCode = amount >= 0 ? 'BP' : 'BR'; // BP=Bank Payment, BR=Bank Receipt
                                
                                // 借贷分离
                                const debit = amount >= 0 ? Math.abs(amount).toFixed(2) : '0.00';
                                const credit = amount < 0 ? Math.abs(amount).toFixed(2) : '0.00';
                                
                                const accountRef = data.accountNumber || '1200'; // 默认账户参考号
                                const reference = t.referenceNumber || t.checkNumber || '';
                                
                                csv += `"${ukDate}","${typeCode}","${accountRef}","${t.description || ''}","${debit}","${credit}","${reference}"\n`;
                            });
                            filename = `Sage_BankStatement_${Date.now()}.csv`;
                        }
                        break;
                    
                    case 'zoho_csv':
                        // 📄 Zoho Books CSV (印度格式 - 借贷分离)
                        if (data.transactions && data.transactions.length > 0) {
                            csv = 'Date,Description,Reference,Debit,Credit\n';
                            data.transactions.forEach(t => {
                                // 转换为 DD/MM/YYYY 格式
                                let indiaDate = t.date || '';
                                if (indiaDate) {
                                    try {
                                        const d = new Date(indiaDate);
                                        if (!isNaN(d.getTime())) {
                                            const day = String(d.getDate()).padStart(2, '0');
                                            const month = String(d.getMonth() + 1).padStart(2, '0');
                                            const year = d.getFullYear();
                                            indiaDate = `${day}/${month}/${year}`;
                                        }
                                    } catch (e) {
                                        console.warn('日期格式转换失败:', indiaDate);
                                    }
                                }
                                
                                // 借贷分离
                                const amount = parseFloat(t.amount || 0);
                                const debit = amount >= 0 ? Math.abs(amount).toFixed(2) : '';
                                const credit = amount < 0 ? Math.abs(amount).toFixed(2) : '';
                                
                                const reference = t.referenceNumber || t.checkNumber || '';
                                
                                csv += `"${indiaDate}","${t.description || ''}","${reference}","${debit}","${credit}"\n`;
                            });
                            filename = `ZohoBooks_BankStatement_${Date.now()}.csv`;
                        }
                        break;
                        
                    case 'qbo':
                        if (data.transactions && data.transactions.length > 0) {
                            const qboContent = generateQBOFile(data);
                            const blob = new Blob([qboContent], { type: 'application/x-qbo;charset=utf-8;' });
                            const url = URL.createObjectURL(blob);
                            const a = document.createElement('a');
                            a.href = url;
                            a.download = `BankStatement_${Date.now()}.qbo`;
                            document.body.appendChild(a);
                            a.click();
                            document.body.removeChild(a);
                            URL.revokeObjectURL(url);
                            console.log('✅ QBO 已下载');
                            return;
                        }
                        break;
                        
                    case 'invoice_summary_csv':
                    case 'invoice_detailed_csv':
                        if (data.items && data.items.length > 0) {
                            csv = 'Code,Description,Quantity,Unit Price,Amount\n';
                            data.items.forEach(item => {
                                csv += `"${item.code || ''}","${item.description || ''}","${item.quantity || 0}","${item.unit_price || item.unitPrice || 0}","${item.amount || 0}"\n`;
                            });
                            filename = `Invoice_${Date.now()}.csv`;
                        }
                        break;
                        
                    default:
                        alert(`${format} 格式即将推出...`);
                        return;
                }
                
                if (!csv) {
                    alert('无数据可导出');
                    return;
                }
                
                // 下载文件
                const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                
                console.log('✅ 已下载:', filename);
            } catch (error) {
                console.error('❌ 导出失败:', error);
                alert('导出失败: ' + error.message);
            }
        };
