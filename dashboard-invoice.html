<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice Processing - VaultCaddy</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="dashboard.css">
    <style>
        /* Dashboard 白色主題覆蓋樣式 */
        body {
            background: #f8fafc !important;
            color: #1f2937 !important;
            padding-top: 80px !important;
        }
        
        .dashboard-container {
            display: flex !important;
            min-height: calc(100vh - 80px) !important;
            margin-top: 0 !important;
        }
        
        .sidebar {
            width: 280px !important;
            background: #ffffff !important;
            border-right: 1px solid #e5e7eb !important;
            flex-shrink: 0 !important;
            overflow-y: auto !important;
        }
        
        .main-content {
            flex: 1 !important;
            background: #ffffff !important;
            overflow-y: auto !important;
        }
        
        .content-header {
            padding: 2rem !important;
            border-bottom: 1px solid #e5e7eb !important;
            background: #ffffff !important;
        }
        
        .content-body {
            padding: 2rem !important;
        }
        
        .feature-highlight {
            background: #f0f9ff;
            border: 1px solid #bae6fd;
            border-radius: 8px;
            padding: 1.5rem;
            margin: 1rem 0;
        }
        
        .upload-area {
            border: 2px dashed #d1d5db;
            border-radius: 8px;
            padding: 3rem;
            text-align: center;
            background: #f9fafb;
            margin: 2rem 0;
            transition: all 0.3s ease;
        }
        
        .upload-area:hover {
            border-color: #3b82f6;
            background: #eff6ff;
        }
        
        .btn-primary {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
        }
        
        .btn-primary:hover {
            background: #2563eb;
        }
    </style>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="translations.js"></script>
    <script src="unified-auth.js"></script>
    <script src="navbar-component.js"></script>
    <script src="document-processor.js"></script>
    <script src="upload-handler.js"></script>
    <script src="dashboard-stats.js"></script>
    <script src="document-manager.js"></script>
    <link rel="stylesheet" href="document-manager.css">
</head>
<body>
    <!-- 導航欄 - 由 navbar-component.js 動態載入 -->
    <div id="navbar-placeholder"></div>

    <!-- Dashboard 容器 -->
    <div class="dashboard-container">
        <!-- 左側邊欄 -->
        <aside class="sidebar">
            <div class="sidebar-header" style="padding: 1.5rem; border-bottom: 1px solid #e5e7eb;">
                <h2 style="color: #1f2937; font-size: 1.25rem; font-weight: 600; margin: 0;">Models</h2>
            </div>
            <nav class="sidebar-nav" style="padding: 1rem;">
                <ul style="list-style: none; padding: 0; margin: 0;">
                    <li class="nav-item" style="margin: 0.5rem 0;">
                        <a href="dashboard-main.html" style="display: flex; align-items: center; padding: 0.75rem 1rem; color: #6b7280; text-decoration: none; border-radius: 6px; transition: all 0.2s ease;">
                            <i class="fas fa-university" style="margin-right: 0.75rem; width: 1rem;"></i>
                            <span>Bank statements</span>
                        </a>
                    </li>
                    <li class="nav-item active" style="margin: 0.5rem 0;">
                        <a href="dashboard-invoice.html" style="display: flex; align-items: center; padding: 0.75rem 1rem; color: #3b82f6; text-decoration: none; border-radius: 6px; background: #eff6ff;">
                            <i class="fas fa-file-invoice" style="margin-right: 0.75rem; width: 1rem;"></i>
                            <span>Invoices</span>
                        </a>
                    </li>
                    <li class="nav-item" style="margin: 0.5rem 0;">
                        <a href="dashboard-receipt.html" style="display: flex; align-items: center; padding: 0.75rem 1rem; color: #6b7280; text-decoration: none; border-radius: 6px; transition: all 0.2s ease;">
                            <i class="fas fa-receipt" style="margin-right: 0.75rem; width: 1rem;"></i>
                            <span>Receipts</span>
                        </a>
                    </li>
                    <li class="nav-item" style="margin: 0.5rem 0;">
                        <a href="dashboard-general.html" style="display: flex; align-items: center; padding: 0.75rem 1rem; color: #6b7280; text-decoration: none; border-radius: 6px; transition: all 0.2s ease;">
                            <i class="fas fa-file-alt" style="margin-right: 0.75rem; width: 1rem;"></i>
                            <span>General</span>
                        </a>
                    </li>
                </ul>
                
                <h3 style="color: #6b7280; font-size: 0.875rem; font-weight: 600; margin: 2rem 0 1rem 0; text-transform: uppercase; letter-spacing: 0.05em;">Configurations</h3>
                <ul style="list-style: none; padding: 0; margin: 0;">
                    <li class="nav-item" style="margin: 0.5rem 0;">
                        <a href="account.html" style="display: flex; align-items: center; padding: 0.75rem 1rem; color: #6b7280; text-decoration: none; border-radius: 6px; transition: all 0.2s ease;">
                            <i class="fas fa-user" style="margin-right: 0.75rem; width: 1rem;"></i>
                            <span>Account</span>
                        </a>
                    </li>
                    <li class="nav-item" style="margin: 0.5rem 0;">
                        <a href="billing.html" style="display: flex; align-items: center; padding: 0.75rem 1rem; color: #6b7280; text-decoration: none; border-radius: 6px; transition: all 0.2s ease;">
                            <i class="fas fa-credit-card" style="margin-right: 0.75rem; width: 1rem;"></i>
                            <span>Billing</span>
                        </a>
                    </li>
                </ul>
            </nav>
        </aside>

        <!-- 主內容區域 -->
        <main class="main-content">
            <!-- 頂部標題和控制 -->
            <header class="content-header">
                <div class="header-left">
                    <h1>Invoice Processing</h1>
                    <p>Manage and view your invoice documents</p>
                </div>
                <div class="header-right">
                    <button class="help-btn" onclick="showHelp()">Need Help?</button>
                </div>
            </header>

            <!-- 控制區域 -->
            <section class="controls-section">
                <div class="controls-bar">
                    <div class="search-filter">
                        <input type="text" placeholder="Filter document name..." class="filter-input">
                    </div>
                    <div class="actions">
                        <button class="upload-btn">
                            <i class="fas fa-upload"></i>
                            Upload files
                        </button>
                        <button class="view-btn">
                            <i class="fas fa-eye"></i>
                            View
                        </button>
                    </div>
                </div>
            </section>

            <!-- 文檔表格 -->
            <section class="documents-table">
                <div class="table-container">
                    <table class="documents-grid">
                        <thead>
                            <tr>
                                <th>
                                    <input type="checkbox" class="select-all">
                                    Document
                                </th>
                                <th>Vendor Info</th>
                                <th>Amount</th>
                                <th>Date Uploaded</th>
                                <th>Status & Review</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- 由 document-manager.js 動態生成 -->
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- 選擇信息 -->
            <div class="selection-info">
                0 of 0 row(s) selected.
            </div>
        </main>
    </div>

    <script>
        // 檢查登入狀態
        function checkLoginStatus() {
            const vaultcaddyToken = localStorage.getItem('vaultcaddy_token');
            const vaultcaddyUser = localStorage.getItem('vaultcaddy_user');
            const userLoggedIn = localStorage.getItem('userLoggedIn');
            
            return (vaultcaddyToken && vaultcaddyUser) || userLoggedIn === 'true';
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 檢查登入狀態
            if (!checkLoginStatus()) {
                window.location.href = 'index.html';
                return;
            }

            // 初始化文檔管理器
            window.invoiceDocumentManager = new DocumentManager('invoice');
            
            // 初始化上傳處理器
            window.invoiceUploadHandler = initializeUploadHandler('#upload-area', 'invoice');
            
            console.log('✅ Invoice Dashboard 初始化完成');
        });
        
        function showHelp() {
            alert('Invoice Processing Help:\n\n1. 上傳發票文件\n2. AI自動提取數據\n3. 查看和編輯結果\n4. 下載處理後的文件');
        }
    </script>
</body>
</html>
