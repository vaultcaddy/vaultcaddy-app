<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Settings - VaultCaddy</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="pages.css">
    <link rel="stylesheet" href="dashboard.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="translations.js"></script>
    <script src="unified-auth.js"></script>
    <script src="navbar-component.js"></script>
    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }
        
        .navbar {
            background: #1e293b;
            border-bottom: 1px solid #334155;
        }
        
        .account-container {
            display: flex;
            min-height: calc(100vh - 80px);
            margin-top: 80px;
        }
        
        .sidebar {
            width: 256px;
            background: #1e293b;
            border-right: 1px solid #334155;
            padding: 2rem 0;
        }
        
        .sidebar-nav {
            list-style: none;
            margin: 0;
            padding: 0;
        }
        
        .sidebar-nav li {
            margin: 0;
        }
        
        .sidebar-nav a {
            display: flex;
            align-items: center;
            padding: 0.75rem 1.5rem;
            color: #94a3b8;
            text-decoration: none;
            transition: all 0.2s ease;
            border-radius: 0;
        }
        
        .sidebar-nav a:hover {
            background: #334155;
            color: white;
        }
        
        .sidebar-nav a.active {
            background: #334155;
            color: white;
            border-right: 3px solid #3b82f6;
        }
        
        .sidebar-nav i {
            width: 20px;
            margin-right: 0.75rem;
            font-size: 1rem;
        }
        
        .main-content {
            flex: 1;
            padding: 2rem 3rem;
            overflow-y: auto;
        }
        
        .page-header {
            margin-bottom: 2rem;
        }
        
        .page-title {
            font-size: 2rem;
            font-weight: 700;
            margin: 0 0 0.5rem 0;
            color: white;
        }
        
        .page-subtitle {
            color: #94a3b8;
            margin: 0;
            font-size: 1rem;
        }
        
        .content-section {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            margin-bottom: 2rem;
        }
        
        .section-header {
            padding: 1.5rem 2rem;
            border-bottom: 1px solid #334155;
        }
        
        .section-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin: 0 0 0.5rem 0;
            color: white;
        }
        
        .section-subtitle {
            color: #94a3b8;
            margin: 0;
            font-size: 0.875rem;
        }
        
        .section-content {
            padding: 2rem;
        }
        
        .profile-section {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid #334155;
        }
        
        .profile-info h3 {
            margin: 0 0 0.5rem 0;
            color: white;
            font-size: 1.25rem;
        }
        
        .profile-info p {
            margin: 0;
            color: #94a3b8;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            color: white;
            font-weight: 500;
        }
        
        .form-input {
            width: 100%;
            padding: 0.75rem 1rem;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            color: white;
            font-size: 0.875rem;
        }
        
        .form-input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        
        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 500;
            text-decoration: none;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .btn-primary {
            background: #3b82f6;
            color: white;
        }
        
        .btn-primary:hover {
            background: #2563eb;
        }
        
        .btn-secondary {
            background: transparent;
            color: #94a3b8;
            border: 1px solid #334155;
        }
        
        .btn-secondary:hover {
            background: #334155;
            color: white;
        }
        
        .connected-account {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            margin-bottom: 1rem;
        }
        
        .account-info {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        
        .account-provider {
            width: 24px;
            height: 24px;
            border-radius: 4px;
        }
        
        .google-icon {
            background: #dc4e41;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 0.75rem;
        }
        
        .three-dots-menu {
            color: #94a3b8;
            cursor: pointer;
            padding: 0.25rem;
        }
        
        .three-dots-menu:hover {
            color: white;
        }
        
        .add-button {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #3b82f6;
            background: transparent;
            border: none;
            cursor: pointer;
            font-size: 0.875rem;
            padding: 0.5rem 0;
        }
        
        .add-button:hover {
            color: #2563eb;
        }
    </style>
</head>
<body>
    <!-- 導航欄 -->
    <nav class="navbar">
        <div class="nav-container">
            <!-- 會由 navbar-component.js 動態渲染 -->
        </div>
    </nav>

    <!-- 帳戶管理容器 -->
    <div class="account-container">
        <!-- 左側邊欄 -->
        <aside class="sidebar">
            <ul class="sidebar-nav">
                <li>
                    <a href="account.html" class="active">
                        <i class="fas fa-user"></i>
                        <span>Account</span>
                    </a>
                </li>
                <li>
                    <a href="billing.html">
                        <i class="fas fa-credit-card"></i>
                        <span>Billing</span>
                    </a>
                </li>
                <li>
                    <a href="integrations.html">
                        <i class="fas fa-puzzle-piece"></i>
                        <span>Integrations</span>
                    </a>
                </li>
                <li>
                    <a href="settings.html">
                        <i class="fas fa-cog"></i>
                        <span>Settings</span>
                    </a>
                </li>
            </ul>
        </aside>

        <!-- 主要內容區域 -->
        <main class="main-content">
            <!-- 頁面標題 -->
            <header class="page-header">
                <h1 class="page-title">Account</h1>
                <p class="page-subtitle">Manage your account settings</p>
            </header>

            <!-- 帳戶資訊區塊 -->
            <div class="content-section">
                <div class="section-header">
                    <h2 class="section-title">Account</h2>
                    <p class="section-subtitle">Manage your account info.</p>
                </div>
                <div class="section-content">
                    <!-- 個人資料區塊 -->
                    <div style="display: flex; gap: 3rem;">
                        <!-- 左側：帳戶管理 -->
                        <div style="flex: 1;">
                            <div style="margin-bottom: 2rem;">
                                <a href="#" class="btn btn-secondary" style="display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1rem;">
                                    <i class="fas fa-user"></i>
                                    <span>Profile</span>
                                </a>
                                <a href="security.html" class="btn btn-secondary" style="display: flex; align-items: center; gap: 0.5rem;">
                                    <i class="fas fa-shield-alt"></i>
                                    <span>Security</span>
                                </a>
                            </div>
                        </div>

                        <!-- 右側：個人資料詳情 -->
                        <div style="flex: 2;">
                            <h3 style="color: white; margin-bottom: 1.5rem;">Profile details</h3>
                            
                            <!-- 個人資料 -->
                            <div class="profile-section">
                                <img src="https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?w=80&h=80&fit=crop&crop=face&auto=format" alt="Profile" class="profile-avatar">
                                <div class="profile-info">
                                    <h3>扭扭1</h3>
                                    <button class="btn btn-primary">Update profile</button>
                                </div>
                            </div>

                            <!-- 電子郵件地址 -->
                            <div class="form-group">
                                <label class="form-label">Email addresses</label>
                                <div class="connected-account">
                                    <div class="account-info">
                                        <span style="color: white;">osclin2011@gmail.com</span>
                                        <span style="color: #94a3b8; font-size: 0.875rem;">Primary</span>
                                    </div>
                                    <div class="three-dots-menu">
                                        <i class="fas fa-ellipsis-h"></i>
                                    </div>
                                </div>
                                <button class="add-button">
                                    <i class="fas fa-plus"></i>
                                    <span>Add email address</span>
                                </button>
                            </div>

                            <!-- 連接的帳戶 -->
                            <div class="form-group">
                                <label class="form-label">Connected accounts</label>
                                <div class="connected-account">
                                    <div class="account-info">
                                        <div class="account-provider google-icon">G</div>
                                        <div>
                                            <div style="color: white; font-weight: 500;">Google</div>
                                            <div style="color: #94a3b8; font-size: 0.875rem;">osclin2011@gmail.com</div>
                                        </div>
                                    </div>
                                    <div class="three-dots-menu">
                                        <i class="fas fa-ellipsis-h"></i>
                                    </div>
                                </div>
                                <button class="add-button">
                                    <i class="fas fa-plus"></i>
                                    <span>Connect account</span>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // 檢查登入狀態
        document.addEventListener('DOMContentLoaded', function() {
            if (!window.UnifiedAuthManager.isLoggedIn()) {
                window.location.href = 'index.html';
                return;
            }

            // 初始化頁面
            initAccountPage();
        });

        function initAccountPage() {
            // 載入用戶資料
            const user = window.UnifiedAuthManager.getUser();
            if (user) {
                // 更新用戶資料顯示
                document.querySelector('.profile-info h3').textContent = user.name || '扭扭1';
                document.querySelector('.profile-avatar').src = user.avatar || 'https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?w=80&h=80&fit=crop&crop=face&auto=format';
                
                // 更新電子郵件
                const emailElements = document.querySelectorAll('.connected-account .account-info span');
                if (emailElements.length > 0) {
                    emailElements[0].textContent = user.email || 'osclin2011@gmail.com';
                }
            }

            console.log('Account page initialized');
        }

        // 更新個人資料
        function updateProfile() {
            window.VaultCaddyNavbar.showNotification('Profile update coming soon!', 'info');
        }

        // 添加電子郵件
        function addEmail() {
            window.VaultCaddyNavbar.showNotification('Add email coming soon!', 'info');
        }

        // 連接帳戶
        function connectAccount() {
            window.VaultCaddyNavbar.showNotification('Connect account coming soon!', 'info');
        }
    </script>
</body>
</html>
