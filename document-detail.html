    <style>
        body.auth-checking { visibility: hidden !important; }
        .auth-loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: flex; align-items: center; justify-content: center; z-index: 10000; visibility: visible !important; }
        body.auth-ready .auth-loading { display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #navbar-placeholder { display: block !important; visibility: visible !important; position: fixed !important; top: 0 !important; left: 0 !important; right: 0 !important; z-index: 999999 !important; opacity: 1 !important; background: #ffffff !important; width: 100% !important; }
        .vaultcaddy-navbar { display: flex !important; visibility: visible !important; opacity: 1 !important; z-index: 999999 !important; }
    </style>
    <script>
        document.documentElement.classList.add('auth-checking');
        if (document.body) { document.body.classList.add('auth-checking'); } 
        else { document.addEventListener('DOMContentLoaded', function() { document.body.classList.add('auth-checking'); }); }
        
        // ✅ 超時保護：10秒後強制顯示頁面（防止卡住）
        setTimeout(function() {
            if (document.body.classList.contains('auth-checking')) {
                console.warn('⚠️ Auth 初始化超時（10秒），強制顯示頁面');
                document.body.classList.remove('auth-checking');
                document.body.classList.add('auth-ready');
                
                // 如果沒有登入，重定向到首頁
                if (!window.simpleAuth || !window.simpleAuth.currentUser) {
                    console.log('❌ 超時且未登入，重定向到首頁');
                    setTimeout(function() {
                        window.location.href = 'index.html';
                    }, 1000);
                }
            }
        }, 10000);
    </script>

    <!-- ✅ 提前定義 goBackToDashboard 函數 -->
    <script>
        // 返回儀表板（提前定義，避免 ReferenceError）
        function goBackToDashboard() {
            const params = new URLSearchParams(window.location.search);
            const projectId = params.get('project');
            if (projectId) {
                window.location.href = `firstproject.html?project=${projectId}`;
            } else {
                window.location.href = 'dashboard.html';
            }
        }
        
        // 🔥 刪除當前文檔（使用與 firstproject.html 相同的方法）
        async function deleteCurrentDocument() {
            const confirmDelete = confirm('確定要刪除此文檔嗎？此操作無法撤銷。');
            if (!confirmDelete) return;
            
            try {
                const params = new URLSearchParams(window.location.search);
                const projectId = params.get('project');
                const documentId = params.get('id');
                
                if (!projectId || !documentId) {
                    alert('無法獲取文檔信息');
                    return;
                }
                
                console.log('🗑️ 開始刪除文檔:', { projectId, documentId });
                
                // 🔥 使用與 firstproject.html 相同的刪除方法
                if (window.simpleDataManager && typeof window.simpleDataManager.deleteDocument === 'function') {
                    // 方法1：使用 simpleDataManager
                    await window.simpleDataManager.deleteDocument(projectId, documentId);
                    console.log('✅ 文檔已刪除 (simpleDataManager)');
                } else if (firebase && firebase.firestore) {
                    // 方法2：直接使用 Firestore（備用）
                    await firebase.firestore()
                        .collection('projects')
                        .doc(projectId)
                        .collection('documents')
                        .doc(documentId)
                        .delete();
                    console.log('✅ 文檔已刪除 (Firestore)');
                } else {
                    throw new Error('無法連接到數據庫');
                }
                
                alert('文檔已成功刪除');
                
                // 🎯 刪除成功後，返回項目頁面（與 firstproject.html 一致）
                console.log('📍 返回項目頁面:', projectId);
                window.location.href = `firstproject.html?project=${projectId}`;
                
            } catch (error) {
                console.error('❌ 刪除文檔失敗:', error);
                alert('刪除文檔失敗: ' + error.message);
            }
        
        }
    </script>

        /* 🎨 優化：默認隱藏次要列（適配所有屏幕，避免滾動） */
        
        /* 列結構（從左到右）：
         * 1. checkbox（已對賬）✅ 保留
         * 2. date（日期）✅ 保留
         * 3. type（類型）❌ 隱藏
         * 4. description（描述）✅ 保留
         * 5. payee（收款人）❌ 隱藏（大多數銀行不單獨顯示，已包含在描述中）
         * 6. reference（參考編號）❌ 隱藏
         * 7. check#（支票號）❌ 隱藏
         * 8. category（分類）✅ 保留（用戶需要）
         * 9. amount（金額）✅ 保留
         * 10. balance（余額）✅ 保留
         * 11. attachment（附件）❌ 隱藏
         * 12. actions（操作）✅ 保留

        .type-cell,
        .payee-cell,
        .ref-cell,
        .check-cell,
        .attachment-cell,
        .transactions-table th:nth-child(3),  /* Type header */
        .transactions-table th:nth-child(5),  /* Payee header - 隱藏（2026-01-11：大多數銀行對賬單不單獨顯示） */
        .transactions-table th:nth-child(6),  /* Reference header */
        .transactions-table th:nth-child(7),  /* Check# header */
        .transactions-table th:nth-child(11)  /* Attachment header */
        {
            display: none !important;
        }
        
        /* ✅ 分類列始終顯示（用戶需要） */
        .category-cell,
        .transactions-table th:nth-child(8) {
            display: table-cell !important;

            .type-cell,

            .transactions-table th:nth-child(3),  /* Type header */
            .transactions-table th:nth-child(6),  /* Reference header */

    <!-- PDF 放大查看功能 -->
    <script>
        let modalCurrentPageIndex = 0;
        let modalPdfPages = [];
        
        // 初始化 PDF 放大功能
        function initPdfZoom() {
            // 獲取所有 PDF 頁面圖片
            const pdfImages = document.querySelectorAll('.pdf-page img');
            modalPdfPages = Array.from(pdfImages);
            
            // 為每個圖片添加點擊事件
            pdfImages.forEach((img, index) => {
                img.addEventListener('click', function() {
                    openPdfModal(index);
                });
            });
        }
        
        // 打開模態框
        function openPdfModal(pageIndex) {
            const modal = document.getElementById('pdfModal');
            const modalImage = document.getElementById('pdfModalImage');
            
            if (modalPdfPages.length === 0) return;
            
            modalCurrentPageIndex = pageIndex;
            modalImage.src = modalPdfPages[pageIndex].src;
            modal.classList.add('active');
            
            updateModalPageInfo();
            
            // 防止背景滾動
            document.body.style.overflow = 'hidden';
        }
        
        // 關閉模態框
        function closePdfModal() {
            const modal = document.getElementById('pdfModal');
            modal.classList.remove('active');
            document.body.style.overflow = 'auto';
        }
        
        // 上一頁
        function previousModalPage() {
            if (modalCurrentPageIndex > 0) {
                modalCurrentPageIndex--;
                updateModalImage();
            }
        }
        
        // 下一頁
        function nextModalPage() {
            if (modalCurrentPageIndex < modalPdfPages.length - 1) {
                modalCurrentPageIndex++;
                updateModalImage();
            }
        }
        
        // 更新模態框圖片
        function updateModalImage() {
            const modalImage = document.getElementById('pdfModalImage');
            modalImage.src = modalPdfPages[modalCurrentPageIndex].src;
            updateModalPageInfo();
        }
        
        // 更新頁碼信息
        function updateModalPageInfo() {
            document.getElementById('modalCurrentPage').textContent = modalCurrentPageIndex + 1;
            document.getElementById('modalTotalPages').textContent = modalPdfPages.length;
        }
        
        // 鍵盤導航
        document.addEventListener('keydown', function(e) {
            const modal = document.getElementById('pdfModal');
            if (!modal.classList.contains('active')) return;
            
            if (e.key === 'Escape') {
                closePdfModal();
            } else if (e.key === 'ArrowLeft') {
                previousModalPage();
            } else if (e.key === 'ArrowRight') {
                nextModalPage();
            }
        });
        
        // 點擊背景關閉
        document.getElementById('pdfModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closePdfModal();
            }
        });
        
        // 延遲初始化，等待 PDF 加載完成
        setTimeout(() => {
            initPdfZoom();
        }, 2000);
        
        // 監聽 PDF 加載完成事件（如果有）

            setTimeout(() => {
                initPdfZoom();
            }, 500);

    // 🎯 导出函数（完全支持 firstproject.html 的所有格式）
    window.vaultcaddyExportDocument = async function(format) {
        console.log('📤 開始導出:', format);
        closeVaultcaddyExportMenu();
        
        // 获取当前文档
        const doc = window.currentDocument;
        if (!doc || !doc.processedData) {
            alert('文檔數據未載入');
            return;
        }
        
        const data = doc.processedData;
        const fileName = (doc.name || 'document').replace(/\.(pdf|jpg|png)$/i, '');
        const dateStr = new Date().toISOString().split('T')[0];
        
        try {
            let exportContent = '';
            let exportFileName = '';
            let mimeType = '';
            
            switch(format) {
                case 'excel':
                    // 📊 Excel (.xlsx) 格式 - 完整银行对账单格式
                    if (typeof XLSX === 'undefined') {
                        alert('Excel 庫未載入，請刷新頁面');
                        return;
                    }
                    
                    // 提取基本信息
                    const customerName = data.accountHolder || data.account_holder || data.customerName || '';
                    const accountNumber = data.accountNumber || data.account_number || '';
                    const accountType = data.accountType || 'Integrated Account';
                    const bankName = data.bankName || data.bank_name || data.bank || '';
                    // 🔥 分行地址：优先使用 branchName (页面上的"分行地址"字段)
                    const bankAddress = data.branchName || data.branch_name || data.bankAddress || data.bank_address || '';
                    
                    // 提取日期
                    const statementPeriod = data.statementPeriod || data.statement_period || data.period || '';
                    let populatedDate = '';
                    let endDate = '';
                    
                    if (statementPeriod && statementPeriod.includes('to')) {
                        const parts = statementPeriod.split(' to ');
                        if (parts.length === 2) {
                            populatedDate = parts[0];
                            endDate = parts[1];
                        }
                    } else {
                        populatedDate = data.statementDate || data.statement_date || '';
                        endDate = data.statementDate || data.statement_date || '';
                    }
                    
                    // 提取餘額
                    const openingBalance = parseFloat(data.openingBalance || data.opening_balance || 0).toFixed(2);
                    const closingBalance = parseFloat(data.closingBalance || data.closing_balance || data.balance || 0).toFixed(2);
                    
                    // CSV 标题（12列格式）
                    const excelData = [[
                        'CustomerName', 'AccountNumber', 'AccountType', 'BankName', 'BankAddress',
                        'OpeningBalance', 'EndingBalance',
                        'LineItems_Date', 'LineItems_Description', 'LineItems_Category', 'LineItems_Credits', 'LineItems_Debits', 'LineItems_Balance'
                    ]];
                    
                    // 为每笔交易生成一行
                    if (data.transactions && data.transactions.length > 0) {
                        data.transactions.forEach(tx => {
                            // 判断是存入(Credits)还是支出(Debits)
                            let credits = '';
                            let debits = '';
                            const amount = parseFloat(tx.amount || 0);
                            
                            // 🔥 修正判断逻辑：优先使用 transactionSign
                            if (tx.transactionSign === 'income') {
                                // 收入 = Credits
                                credits = Math.abs(amount).toFixed(2);
                                debits = '';
                            } else if (tx.transactionSign === 'expense') {
                                // 支出 = Debits
                                credits = '';
                                debits = Math.abs(amount).toFixed(2);
                            } else {
                                // 如果没有 transactionSign，根据金额符号判断
                                if (amount >= 0) {
                                    credits = Math.abs(amount).toFixed(2);
                                    debits = '';
                                } else {
                                    credits = '';
                                    debits = Math.abs(amount).toFixed(2);
                                }
                            }
                            
                            // 获取分类显示文本（如果未分类则为空白）
                            const getCategoryLabel = (categoryValue) => {
                                if (!categoryValue) return '';
                                
                                const categoryMap = {
                                    // 收入类别
                                    'salary': '工資',
                                    'sales': '銷售收入',
                                    'interest': '利息收入',
                                    'other-income': '其他收入',
                                    // 支出类别
                                    'office': '辦公費用',
                                    'transport': '交通費用',
                                    'meal': '餐飲費用',
                                    'utilities': '水電費',
                                    'rent': '租金',
                                    'salary-expense': '工資支出',
                                    'marketing': '營銷費用',
                                    'supplies': '辦公用品',
                                    'other-expense': '其他支出'
                                };
                                
                                return categoryMap[categoryValue] || categoryValue;
                            };
                            
                            const category = getCategoryLabel(tx.category);
                            
                            excelData.push([
                                customerName,
                                accountNumber,
                                accountType,
                                bankName,
                                bankAddress,
                                openingBalance,
                                closingBalance,
                                tx.date || '',
                                tx.description || '',
                                category,
                                credits,
                                debits,
                                parseFloat(tx.balance || 0).toFixed(2)
                            ]);
                        });
                    }
                    
                    const wb = XLSX.utils.book_new();
                    const ws = XLSX.utils.aoa_to_sheet(excelData);
                    ws['!cols'] = [
                        {wch: 20}, {wch: 15}, {wch: 18}, {wch: 20}, {wch: 40},
                        {wch: 15}, {wch: 15},
                        {wch: 12}, {wch: 40}, {wch: 15}, {wch: 12}, {wch: 12}, {wch: 15}
                    ];
                    XLSX.utils.book_append_sheet(wb, ws, "Bank Statement");
                    XLSX.writeFile(wb, `${fileName}.xlsx`);
                    console.log('✅ Excel 文件已下載（12列格式，含分類）');
                    break;

                    // 🌐 通用 CSV (適用於 Xero, Wave, QuickBooks, MYOB)
                    if (!window.BankStatementExport) {
                        alert('導出模塊未載入，請刷新頁面後重試');
                        return;
                    }
                    exportContent = window.BankStatementExport.generateUniversalCSV([doc]);
                    exportFileName = `${fileName}_Universal_${dateStr}.csv`;
                    mimeType = 'text/csv;charset=utf-8;';
                    console.log('✅ 通用 CSV 生成完成');
                    break;
                    
                case 'sage_csv':

                    if (!window.BankStatementExport) {
                        alert('導出模塊未載入，請刷新頁面後重試');
                        return;

                    exportContent = window.BankStatementExport.generateSageCSV([doc]);
                    exportFileName = `${fileName}_Sage_${dateStr}.csv`;
                    mimeType = 'text/csv;charset=utf-8;';
                    console.log('✅ Sage CSV 生成完成');

                        return;
                    }
                    exportContent = window.BankStatementExport.generateZohoCSV([doc]);
                    exportFileName = `${fileName}_Zoho_${dateStr}.csv`;
                    mimeType = 'text/csv;charset=utf-8;';
                    console.log('✅ Zoho Books CSV 生成完成');
                    break;
                    
                // ========== 发票导出格式 ==========
                case 'invoice_universal_csv':
                    // 🌐 发票通用 CSV
                    if (!window.InvoiceExport || !window.InvoiceExport.generateUniversalCSV) {
                        alert('發票導出模塊未載入，請刷新頁面後重試');
                        return;
                    }
                    exportContent = window.InvoiceExport.generateUniversalCSV([doc]);
                    exportFileName = `Invoice_Universal_${dateStr}.csv`;
                    mimeType = 'text/csv;charset=utf-8;';
                    console.log('✅ 發票通用 CSV 生成完成');
                    break;
                
                case 'invoice_sage_csv':
                    // 📄 发票 Sage CSV
                    if (!window.InvoiceExport || !window.InvoiceExport.generateSageCSV) {

                    if (typeof XLSX === 'undefined') {
                        alert('Excel 庫未載入，請刷新頁面');

                    try {
                        const wb = XLSX.utils.book_new();
                        const excelData = [['Invoice Number', 'Date', 'Supplier', 'Amount', 'Tax', 'Status']];
                        
                        excelData.push([
                            data.invoiceNumber || data.invoice_number || '',
                            data.invoiceDate || data.date || '',
                            data.vendorName || data.vendor || data.supplier || '',
                            parseFloat(data.totalAmount || data.total || 0).toFixed(2),
                            parseFloat(data.taxAmount || data.tax || 0).toFixed(2),
                            data.status || data.paymentStatus || '未付款'
                        ]);
                        
                        const ws = XLSX.utils.aoa_to_sheet(excelData);
                        ws['!cols'] = [{wch: 15}, {wch: 12}, {wch: 25}, {wch: 12}, {wch: 10}, {wch: 12}];
                        XLSX.utils.book_append_sheet(wb, ws, "Invoice Summary");
                        
                        XLSX.writeFile(wb, `Invoice_Summary_${dateStr}.xlsx`);
                        console.log('✅ 發票標準 Excel 已下載');
                        return; // Excel导出不走后续的blob下载逻辑
                    } catch (error) {
                        console.error('❌ 發票 Excel 導出失敗:', error);
                        alert('Excel 導出失敗，請重試');
                        return;
                    }
                
                case 'invoice_detailed_excel':
                    // 📊 发票完整交易數據 Excel
                    if (typeof XLSX === 'undefined') {
                        alert('Excel 庫未載入，請刷新頁面');
                        return;
                    }
                    try {
                        const wb = XLSX.utils.book_new();
                        const excelData = [[
                            'Invoice Number', 'Date', 'Supplier Name', 'Supplier Phone', 'Supplier Email',
                            'Item Code', 'Item Description', 'Quantity', 'Unit', 'Unit Price',
                            'Amount', 'Total Amount', 'Tax', 'Status'
                        ]];
                        
                        const invoiceNumber = data.invoiceNumber || data.invoice_number || '';
                        const invoiceDate = data.invoiceDate || data.date || '';
                        const supplierName = data.vendorName || data.vendor || data.supplier || '';
                        const supplierPhone = data.vendorPhone || data.phone || '';
                        const supplierEmail = data.vendorEmail || data.email || '';
                        const totalAmount = parseFloat(data.totalAmount || data.total || 0);
                        const tax = parseFloat(data.taxAmount || data.tax || 0);
                        const status = data.status || '未付款';
                        
                        const items = data.items || data.lineItems || [];
                        
                        if (items.length === 0) {
                            excelData.push([
                                invoiceNumber, invoiceDate, supplierName, supplierPhone, supplierEmail,
                                '', '總計', 1, '', totalAmount.toFixed(2),
                                totalAmount.toFixed(2), totalAmount.toFixed(2), tax.toFixed(2), status
                            ]);
                        } else {
                            items.forEach(item => {
                                const itemCode = item.code || item.itemCode || '';
                                const itemDescription = item.description || item.itemName || '';
                                const quantity = parseFloat(item.quantity || 1);
                                const unit = item.unit || '件';
                                const unitPrice = parseFloat(item.unitPrice || item.price || 0);
                                const amount = parseFloat(item.amount || (quantity * unitPrice));
                                
                                excelData.push([
                                    invoiceNumber, invoiceDate, supplierName, supplierPhone, supplierEmail,
                                    itemCode, itemDescription, quantity, unit, unitPrice.toFixed(2),
                                    amount.toFixed(2), totalAmount.toFixed(2), tax.toFixed(2), status
                                ]);
                            });
                        }
                        
                        const ws = XLSX.utils.aoa_to_sheet(excelData);
                        ws['!cols'] = [
                            {wch: 15}, {wch: 12}, {wch: 25}, {wch: 15}, {wch: 25},
                            {wch: 12}, {wch: 40}, {wch: 10}, {wch: 8}, {wch: 12},
                            {wch: 12}, {wch: 12}, {wch: 10}, {wch: 10}
                        ];
                        XLSX.utils.book_append_sheet(wb, ws, "Invoice Details");
                        
                        XLSX.writeFile(wb, `Invoice_Detailed_${dateStr}.xlsx`);
                        console.log('✅ 發票完整 Excel 已下載');
                        return; // Excel导出不走后续的blob下载逻辑
                    } catch (error) {
                        console.error('❌ 發票 Excel 導出失敗:', error);
                        alert('Excel 導出失敗，請重試');
                        return;
                    }
                
                // ========== 通用格式（银行对账单和发票都支持）==========
                case 'qbo':
                    // ☁️ QBO 文件 (QuickBooks Online 官方格式)
                    try {
                        if (!data.transactions || data.transactions.length === 0) {
                            alert('沒有交易記錄可導出');
                            return;
                        }
                        
                        console.log('📊 生成 QBO 文件...');
                        const qboContent = generateQBOFile(data);
                        const blob = new Blob([qboContent], { type: 'application/x-qbo;charset=utf-8;' });
                        const url = URL.createObjectURL(blob);
                        const link = document.createElement('a');
                        link.href = url;
                        link.download = `${fileName}_${dateStr}.qbo`;
                        link.style.visibility = 'hidden';
                        document.body.appendChild(link);
                        link.click();
                        document.body.removeChild(link);
                        URL.revokeObjectURL(url);
                        console.log('✅ QBO 文件已下載');
                    } catch (error) {
                        console.error('❌ QBO 生成失敗:', error);
                        alert('QBO 文件生成失敗: ' + error.message);
                    }
                    return;
                    
                default:
                    alert('未知格式: ' + format);
                    return;
            }
            
            // 下载 CSV 文件
            if (exportContent) {
                const blob = new Blob(['\uFEFF' + exportContent], { type: mimeType });
                const link = document.createElement('a');
                const url = URL.createObjectURL(blob);
                
                link.setAttribute('href', url);
                link.setAttribute('download', exportFileName);
                link.style.visibility = 'hidden';
                
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                
                URL.revokeObjectURL(url);
                console.log('✅ 文件已下載:', exportFileName);
            }
            
        } catch (error) {
            console.error('❌ 導出失敗:', error);
            alert('導出失敗: ' + error.message);
        }
    };
    
    console.log('✅ VaultCaddy Export System 已載入');
    </script>

</body>
