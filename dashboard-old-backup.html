<!-- 🔒 頁面保護：立即隱藏內容，等待 Auth 檢查 -->
<style>
        /* 頁面加載時隱藏內容 */
        body.auth-checking {
            visibility: hidden !important;
        }
        
        /* 顯示加載動畫 */
        .auth-loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999999 !important; /* ✅ 超高z-index确保显示在最上层 */
            visibility: visible !important;
            pointer-events: auto !important;
        }
        
        body.auth-ready .auth-loading {
            display: none;
        }
        
        /* ✅ 确保 auth-ready 时页面可见 */
        body.auth-ready {
            visibility: visible !important;
        }
        
        html.auth-ready {
            visibility: visible !important;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
<script>
        // 立即添加 auth-checking 類，防止未登入用戶看到內容
        document.documentElement.classList.add('auth-checking');
        if (document.body) {
            document.body.classList.add('auth-checking');
        } else {
            document.addEventListener('DOMContentLoaded', function() {
                document.body.classList.add('auth-checking');
            });
        }
        
        // ✅ 安全超时：3秒后强制显示页面（防止卡在认证检查）
        setTimeout(function() {
            logger.log('⏰ 认证超时保护：强制显示页面');
            logger.log('   - 当前body类:', document.body ? document.body.className : 'body不存在');
            logger.log('   - 当前html类:', document.documentElement.className);
            
            document.documentElement.classList.remove('auth-checking');
            document.documentElement.classList.add('auth-ready');
            if (document.body) {
                document.body.classList.remove('auth-checking');
                document.body.classList.add('auth-ready');
                document.body.style.visibility = 'visible';
                document.body.style.overflow = 'auto';
            }
            
            // 隐藏加载动画
            const authLoading = document.querySelector('.auth-loading');
            if (authLoading) {
                authLoading.style.display = 'none';
                logger.log('   - 已隐藏auth-loading');
            }
            
            logger.log('   ✅ 超时保护完成');
        }, 3000); // 3秒超时保护
    </script>

<!-- ✅ index.html 動態更新用戶狀態 -->
<script>
        document.addEventListener('DOMContentLoaded', function() {
            logger.log('✅ index.html 初始化');
            
            let userCredits = 0;
            let userEmail = '';
            let userDisplayName = '';
            
            // 獲取用戶首字母
            function getUserInitial() {
                // 優先使用 displayName 的第一個字母
                if (userDisplayName && userDisplayName.trim()) {
                    return userDisplayName.charAt(0).toUpperCase();
                }
                // 否則使用 email 的第一個字母
                if (userEmail && userEmail.trim()) {
                    return userEmail.charAt(0).toUpperCase();
                }
                return 'U';
            }
            
            // 🔥 漢堡菜單功能（立即執行，不等待 DOMContentLoaded）
            (function() {
                logger.log('🔵 初始化漢堡菜單...');
                
                // 打開側邊欄
                window.openMobileSidebar = function() {
                    logger.log('🔵 openMobileSidebar 被調用');
                    const sidebar = document.getElementById('mobile-sidebar');
                    const overlay = document.getElementById('mobile-sidebar-overlay');
                    logger.log('🔵 sidebar:', sidebar);
                    logger.log('🔵 overlay:', overlay);
                    
                    if (sidebar && overlay) {
                        sidebar.style.left = '0';
                        overlay.style.display = 'block';
                        document.body.style.overflow = 'hidden';
                        logger.log('✅ 側邊欄已打開');
                    } else {
                        console.error('❌ 找不到側邊欄或遮罩元素');
                    }
                };
                
                // 關閉側邊欄
                window.closeMobileSidebar = function() {
                    logger.log('🔵 closeMobileSidebar 被調用');
                    const sidebar = document.getElementById('mobile-sidebar');
                    const overlay = document.getElementById('mobile-sidebar-overlay');
                    
                    if (sidebar && overlay) {
                        sidebar.style.left = '-100%';
                        overlay.style.display = 'none';
                        document.body.style.overflow = 'auto';
                        logger.log('✅ 側邊欄已關閉');
                    }
                };
                
                // 漢堡菜單按鈕使用 onclick，無需額外綁定
                logger.log('✅ 漢堡菜單功能已就緒（使用 onclick）');
            })();
                
                // 手機版自動輪播（僅在手機版啟用）
                if (window.innerWidth <= 768) {
                    // 評價輪播
                    const testimonialsContainer = document.getElementById('testimonials-container');
                    if (testimonialsContainer) {
                        let testimonialIndex = 0;
                        const testimonialCards = testimonialsContainer.children;
                        
                        setInterval(() => {
                            testimonialIndex = (testimonialIndex + 1) % testimonialCards.length;
                            const scrollAmount = testimonialCards[testimonialIndex].offsetLeft - testimonialsContainer.offsetLeft;
                            testimonialsContainer.scrollTo({
                                left: scrollAmount,
                                behavior: 'smooth'
                            });
                        }, 4000); // 每4秒切換
                    }
                    
                    // 學習中心輪播
                    const learningContainer = document.getElementById('learning-center-container');
                    if (learningContainer) {
                        let learningIndex = 0;
                        const learningCards = learningContainer.children;
                        
                        setInterval(() => {
                            learningIndex = (learningIndex + 1) % learningCards.length;
                            const scrollAmount = learningCards[learningIndex].offsetLeft - learningContainer.offsetLeft;
                            learningContainer.scrollTo({
                                left: scrollAmount,
                                behavior: 'smooth'
                            });
                        }, 5000); // 每5秒切換
                    }
                }
            
            // 切換下拉菜單
            async function toggleDropdown() {
                const dropdown = document.getElementById('user-dropdown');
                if (dropdown.style.display === 'none') {
                    dropdown.style.display = 'block';
                    
                    // 🔥 即時從 SimpleDataManager 獲取最新用戶數據
                    let planType = 'Free Plan';
                    if (window.simpleDataManager && window.simpleDataManager.initialized) {
                        try {
                            userCredits = await window.simpleDataManager.getUserCredits();
                            logger.log('✅ 即時獲取 Credits:', userCredits);
                            
                            // 獲取套餐類型
                            const currentUser = window.simpleAuth?.getCurrentUser();
                            if (currentUser) {
                                const userDoc = await window.simpleDataManager.db.collection('users').doc(currentUser.uid).get();
                                if (userDoc.exists) {
                                    planType = userDoc.data().planType || 'Free Plan';
                                }
                            }
                        } catch (error) {
                            console.error('❌ 無法獲取用戶數據:', error);
                        }
                    }
                    
                    // ✅ 更新下拉菜單內容（新版）
                    const avatarEl = document.getElementById('dropdown-avatar');
                    const nameEl = document.getElementById('dropdown-name');
                    const emailEl = document.getElementById('dropdown-email');
                    const creditsEl = document.getElementById('dropdown-credits');
                    const planEl = document.getElementById('dropdown-plan');
                    
                    if (avatarEl) avatarEl.textContent = getUserInitial();
                    if (nameEl) nameEl.textContent = userDisplayName || userEmail.split('@')[0] || 'User';
                    if (emailEl) emailEl.textContent = userEmail;
                    if (creditsEl) creditsEl.textContent = userCredits.toLocaleString();
                    if (planEl) planEl.textContent = planType;
                } else {
                    dropdown.style.display = 'none';
                }
            }
            
            // 點擊外部關閉下拉菜單
            document.addEventListener('click', function(event) {
                const dropdown = document.getElementById('user-dropdown');
                const userMenu = document.getElementById('user-menu');
                
                if (dropdown && userMenu && 
                    !dropdown.contains(event.target) && 
                    !userMenu.contains(event.target)) {
                    dropdown.style.display = 'none';
                }
            });
            
            // 登出功能
            window.handleLogout = async function() {
                try {
                    if (window.simpleAuth) {
                        await window.simpleAuth.logout();
                        window.location.href = 'index.html';
                    }
                } catch (error) {
                    console.error('登出失敗:', error);
                    alert('登出失敗，請重試');
                }
            };
            
            // 等待 Firebase 和 simpleAuth 加載
            async function updateUserMenu() {
                const userMenu = document.getElementById('user-menu');
                if (!userMenu) return;
                
                try {
                    const isLoggedIn = window.simpleAuth && window.simpleAuth.isLoggedIn();
                    
                    if (isLoggedIn) {
                        // ✅ 已登入：顯示用戶頭像
                        const currentUser = window.simpleAuth.getCurrentUser();
                        userEmail = currentUser.email || '';
                        userDisplayName = currentUser.displayName || '';
                        
                        // 🔥 從 Firestore 獲取 displayName 和 credits
                        if (window.simpleDataManager && window.simpleDataManager.initialized) {
                            try {
                                const userDoc = await window.simpleDataManager.getUserDocument();
                                if (userDoc) {
                                    userDisplayName = userDoc.displayName | userDisplayName;
                                    userCredits = userDoc.credits | 0;
                                    logger.log('✅ index.html 獲取 Credits:', userCredits);
                                }
                            } catch (error) {
                                logger.log('⚠️ 無法從 Firestore 獲取用戶資料:', error);
                            }
                        } else {
                            logger.log('⏳ SimpleDataManager 尚未初始化，等待中...');
                            // 延遲重試
                            setTimeout(async () => {
                                if (window.simpleDataManager && window.simpleDataManager.initialized) {
                                    try {
                                        userCredits = await window.simpleDataManager.getUserCredits();
                                        logger.log('✅ 延遲獲取 Credits:', userCredits);
                                    } catch (error) {
                                        console.error('❌ 延遲獲取失敗:', error);
                                    }
                                }
                            }, 1000);
                        }
                        
                        const userInitial = getUserInitial();
                        logger.log(`👤 用戶首字母: "${userInitial}" (displayName: "${userDisplayName}")`);
                        
                        userMenu.innerHTML = `
                            <div onclick="toggleDropdown()" class="user-menu-trigger">
                                <div class="user-avatar">${userInitial}</div>
                            </div>
                        `;
                        logger.log('✅ 用戶已登入，顯示頭像');
                    } else {
                        // ✅ 未登入：顯示登入按鈕
                        userMenu.innerHTML = `
                            <button onclick="window.location.href='auth.html'" class="login-button">登入</button>
                        `;
                        logger.log('✅ 用戶未登入，顯示登入按鈕');
                    }
                } catch (e) {
                    logger.log('❌ 無法更新用戶菜單:', e);
                }
            }
            
            // ✅ 等待 simpleAuth 初始化後再更新用戶菜單
            async function waitForAuthAndUpdate() {
                if (window.simpleAuth && window.simpleAuth.initialized) {
                    updateUserMenu();
                    return;
                }
                let attempts = 0;
                const checkInterval = setInterval(() => {
                    attempts++;
                    if (window.simpleAuth && window.simpleAuth.initialized) {
                        clearInterval(checkInterval);
                        console.log('✅ simpleAuth 初始化完成，更新用戶菜單');
                        updateUserMenu();
                    } else if (attempts > 50) {
                        clearInterval(checkInterval);
                        console.warn('⚠️ simpleAuth 初始化超時，強制更新用戶菜單');
                        updateUserMenu();
                    }
                }, 100);
            }
            waitForAuthAndUpdate();
            
            // 監聽 Firebase 和 Auth 事件
            window.addEventListener('firebase-ready', updateUserMenu);
            window.addEventListener('user-logged-in', updateUserMenu);
            window.addEventListener('user-logged-out', updateUserMenu);
            window.addEventListener('auth-state-changed', updateUserMenu);
            
            // 暴露 toggleDropdown 到全局
            window.toggleDropdown = toggleDropdown;
        });
    </script>

                    請輸入項目名稱以確認刪除
                </label>
<input id="deleteProjectConfirmInput" oninput="validateDeleteInput()" placeholder="輸入項目名稱" style="width: 100%; padding: 0.75rem; border: 1px solid #d1d5db; border-radius: 6px; font-size: 0.875rem; color: #1f2937; box-sizing: border-box;" type="text"/>
</div>
<div style="display: flex; justify-content: flex-end; gap: 0.75rem;">
<button onclick="closeDeleteProjectModal()" style="background: #ffffff; border: 1px solid #d1d5db; color: #374151; padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; font-size: 0.875rem; font-weight: 500;">
                    取消
                </button>
<button disabled="" id="confirmDeleteBtn" onclick="confirmDeleteProject()" style="background: #ef4444; border: none; color: white; padding: 0.5rem 1rem; border-radius: 6px; cursor: not-allowed; font-size: 0.875rem; font-weight: 500; opacity: 0.5;"><span data-translate="yes_delete">是</span></button>
</div>
</div>
</div>
<script>
        // 打開創建項目模態框
        function openCreateProjectModal() {
            const modal = document.getElementById('createProjectModal');
            const input = document.getElementById('projectName');
            modal.classList.add('active');
            input.value = '';
            input.focus();
        }

        // 關閉創建項目模態框
        function closeCreateProjectModal() {
            const modal = document.getElementById('createProjectModal');
            modal.classList.remove('active');
        }

        // 創建新項目
        async function createProject() {
            const input = document.getElementById('projectName');
            const projectName = input.value.trim();
            
            if (!projectName) {
                alert('Please enter a project name');
                return;
            }
            
            // 保存到 Firebase
            try {
                const projectData = await window.simpleDataManager.createProject(projectName);
                logger.log('✅ 項目已保存到 Firebase:', projectData);
            
            // 關閉模態框
            closeCreateProjectModal();
            
                // 🔥 修復：使用 Firebase 返回的真實 projectId
                const projectId = projectData.id;
                logger.log('🚀 跳轉到新項目頁面:', projectId);
                
                // 跳轉到新項目頁面
                window.location.href = `firstproject.html?project=${projectId}`;
            } catch (error) {
                console.error('❌ 保存到 Firebase 失敗:', error);
                alert('創建項目失敗，請重試');
                return;
            }
        }

        // ✅ 簡化：直接使用 SimpleAuth
        function checkLoginStatus() {
            return window.simpleAuth && window.simpleAuth.isLoggedIn();
        }

        // 載入項目列表
        async function loadProjects() {
            logger.log('🔄 載入項目列表');
            
            // 從 Firebase 獲取項目數據
            let projects = [];
            try {
                projects = await window.simpleDataManager.getProjects();
                logger.log(`✅ 從 Firebase 加載 ${projects.length} 個項目`);
            } catch (error) {
                console.error('❌ 從 Firebase 加載項目失敗:', error);
                projects = [];
            }
            
            const tbody = document.getElementById('projects-tbody');
            
            if (projects.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="4">
                            <div class="empty-state">
                                <i class="fas fa-folder-open"></i>
                                <h3>No projects yet</h3>
                                <p>Create your first project to get started</p>
                            </div>
                        </td>
                    </tr>
                `;
                return;
            }
            
            tbody.innerHTML = projects.map(project => `
                <tr onclick="window.location.href='firstproject.html?project=${project.id}'" style="cursor: pointer;">
                    <td>
                        <div class="project-name">
                            <div class="project-thumbnail">
                                ${project.thumbnail ? 
                                    `<img src="${project.thumbnail}" alt="${project.name}" loading="lazy" decoding="async">` : 
                                    '<i class="fas fa-file-alt"></i>'
                                }
                            </div>
                            <div class="project-info">
                                <div class="project-title">${project.name}</div>
                            </div>
                        </div>
                    </td>
                    <td class="date-cell">${formatDate(project.updatedAt || project.lastModified || project.createdAt)}</td>
                    <td class="date-cell">${formatDate(project.createdAt || project.created)}</td>
                    <td style="text-align: center;">
                        <button 
                            onclick="event.stopPropagation(); showDeleteProjectModal('${project.id}', '${project.name.replace(/'/g, "\\'")}')" 
                            style="background: none; border: none; color: #9ca3af; cursor: pointer; padding: 0.5rem; border-radius: 4px; transition: all 0.2s;"
                            onmouseover="this.style.color='#ef4444'; this.style.backgroundColor='#fee2e2'"
                            onmouseout="this.style.color='#9ca3af'; this.style.backgroundColor='transparent'"
                            title="刪除項目">
                            <i class="fas fa-trash" style="font-size: 1rem;"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        // 格式化日期
        function formatDate(dateValue) {
            if (!dateValue) return '-';
            
            let date;
            
            // 處理 Firebase Timestamp 對象
            if (typeof dateValue === 'object' && dateValue.seconds) {
                // 檢查 seconds 是否為有效值（不為 0 或負數）
                if (dateValue.seconds <= 0) {
                    logger.warn('⚠️ 無效的 Firebase Timestamp:', dateValue);
                    return '-';
                }
                date = new Date(dateValue.seconds * 1000);
            } 
            // 處理 Date 對象
            else if (dateValue instanceof Date) {
                date = dateValue;
            }
            // 處理數字時間戳
            else if (typeof dateValue === 'number') {
                // 檢查時間戳是否為有效值
                if (dateValue <= 0) {
                    logger.warn('⚠️ 無效的時間戳:', dateValue);
                    return '-';
                }
                date = new Date(dateValue);
            }
            // 處理字符串
            else if (typeof dateValue === 'string') {
                date = new Date(dateValue);
            }
            else {
                logger.warn('⚠️ 未知的日期格式:', dateValue);
                return '-';
            }
            
            // 檢查日期是否有效
            if (isNaN(date.getTime()) || date.getTime() <= 0) {
                logger.warn('⚠️ 無效的日期:', date);
                return '-';
            }
            
            // 返回格式化的日期
            return date.toLocaleDateString('zh-TW', { 
                year: 'numeric', 
                month: '2-digit', 
                day: '2-digit' 
            });
        }

        // ==================== 刪除項目模態框 ====================
        let projectToDelete = null;

        function showDeleteProjectModal(projectId, projectName) {
            projectToDelete = { id: projectId, name: projectName };
            const modal = document.getElementById('deleteProjectModal');
            const nameDisplay = document.getElementById('deleteProjectName');
            const confirmInput = document.getElementById('deleteProjectConfirmInput');
            const confirmBtn = document.getElementById('confirmDeleteBtn');
            
            nameDisplay.textContent = projectName;
            confirmInput.value = '';
            confirmBtn.disabled = true;
            modal.style.display = 'flex';
            
            setTimeout(() => confirmInput.focus(), 100);
        }

        function closeDeleteProjectModal() {
            const modal = document.getElementById('deleteProjectModal');
            modal.style.display = 'none';
            projectToDelete = null;
        }

        function validateDeleteInput() {
            const confirmInput = document.getElementById('deleteProjectConfirmInput');
            const confirmBtn = document.getElementById('confirmDeleteBtn');
            
            if (projectToDelete && confirmInput.value === projectToDelete.name) {
                confirmBtn.disabled = false;
                confirmBtn.style.opacity = '1';
                confirmBtn.style.cursor = 'pointer';
            } else {
                confirmBtn.disabled = true;
                confirmBtn.style.opacity = '0.5';
                confirmBtn.style.cursor = 'not-allowed';
            }
        }

        async function confirmDeleteProject() {
            if (!projectToDelete) return;
            
            try {
                await window.simpleDataManager.deleteProject(projectToDelete.id);
                logger.log('✅ 項目已刪除:', projectToDelete.name);
                
                // 觸發側邊欄更新
                window.dispatchEvent(new Event('projectDeleted'));
                
                // 關閉模態框
                closeDeleteProjectModal();
                
                // 重新加載項目列表
                loadProjects();
                
                alert('項目已成功刪除');
            } catch (error) {
                console.error('❌ 刪除項目失敗:', error);
                alert('刪除項目失敗: ' + error.message);
            }
        }

        // 初始化示例項目函數已移除 - 新用戶應該看到空白項目列表
        // function initializeSampleProjects() {
        //     新用戶註冊時不應該有任何預設項目
        // }

        // 🔥 監聽 SimpleAuth 初始化完成事件
        let authInitialized = false;
        let dataManagerInitialized = false;
        
        window.addEventListener('auth-state-changed', async function(e) {
            logger.log('🔥 收到 auth-state-changed 事件');
            authInitialized = true;
            
            // 檢查是否已登入
            if (!e.detail.user) {
                logger.log('❌ 用戶未登入');
                return; // SimpleAuth 會自動處理重定向
            }
            
            logger.log('✅ 用戶已登入:', e.detail.user.email);
            
            // 初始化側邊欄
            initializeDashboard();
        });
        
        // 初始化 Dashboard
        function initializeDashboard() {
            logger.log('🎯 初始化 Dashboard...');
            
            // 初始化側邊欄
            if (window.VaultCaddySidebar && !window.dashboardSidebar) {
                window.dashboardSidebar = new VaultCaddySidebar('dashboard');
                logger.log('✅ 側邊欄已初始化');
            }
            
            // 如果 SimpleDataManager 已初始化，載入項目
            if (window.simpleDataManager && window.simpleDataManager.initialized) {
                logger.log('✅ SimpleDataManager 已就緒，載入項目');
                loadProjects();
            }
        }
        
        // 監聽 SimpleDataManager 初始化完成
        // （通過輪詢檢查，因為 simple-data-manager.js 沒有觸發專用事件）
        const checkDataManager = setInterval(() => {
            if (window.simpleDataManager && window.simpleDataManager.initialized && !dataManagerInitialized) {
                dataManagerInitialized = true;
                clearInterval(checkDataManager);
                logger.log('✅ SimpleDataManager 已初始化');
                
                // 如果用戶已登入，載入項目
                if (authInitialized && window.simpleAuth && window.simpleAuth.isLoggedIn()) {
                    logger.log('✅ 用戶已登入 + SimpleDataManager 已就緒，載入項目');
                    loadProjects();
                }
            }
        }, 100);
        
        // 超時保護（15 秒）
        setTimeout(() => {
            clearInterval(checkDataManager);
            if (!dataManagerInitialized) {
                console.error('❌ SimpleDataManager 初始化超時');
            }
        }, 15000);
        
        // ==================== Email 驗證檢查 ====================
        (async function initEmailVerification() {
            try {
                // 等待 Firebase 和驗證檢查器初始化
                await new Promise((resolve) => {
                    const checkReady = setInterval(() => {
                        if (window.emailVerificationChecker && firebase.auth) {
                            clearInterval(checkReady);
                            resolve();
                        }
                    }, 100);
                    
                    setTimeout(() => {
                        clearInterval(checkReady);
                        resolve();
                    }, 10000);
                });
                
                // 檢查驗證狀態並顯示提示（不阻擋功能）
                await checkEmailVerification({ showNotice: true, blockPage: false });
            } catch (error) {
                console.error('❌ Email 驗證檢查失敗:', error);
            }
        })();
    </script>
<!-- 🔥 漢堡菜單超級簡單修復方案 -->
<script>
        logger.log('🔥 開始初始化漢堡菜單...');
        
        // 打開側邊欄函數
        function openSidebar() {
            logger.log('🔵 打開側邊欄');
            const sidebar = document.getElementById('mobile-sidebar');
            const overlay = document.getElementById('mobile-sidebar-overlay');
            
            if (sidebar && overlay) {
                sidebar.style.left = '0';
                overlay.style.display = 'block';
                overlay.style.pointerEvents = 'auto';
                // 触发重排后再改透明度，确保动画生效
                setTimeout(() => {
                    overlay.style.opacity = '1';
                }, 10);
                document.body.style.overflow = 'hidden';
                logger.log('✅ 側邊欄已打開');
            }
        }
        
        // 關閉側邊欄函數
        function closeSidebar() {
            logger.log('🔵 關閉側邊欄');
            const sidebar = document.getElementById('mobile-sidebar');
            const overlay = document.getElementById('mobile-sidebar-overlay');
            
            if (sidebar && overlay) {
                sidebar.style.left = '-100%';
                overlay.style.opacity = '0';
                overlay.style.pointerEvents = 'none';
                setTimeout(() => {
                    overlay.style.display = 'none';
                }, 300); // 等待動畫完成（與 CSS transition 一致）
                document.body.style.overflow = 'auto';
                logger.log('✅ 側邊欄已關閉');
            }
        }
        
        // 超級簡單的初始化函數
        function simpleInitMenu() {
            const btn = document.getElementById('mobile-menu-btn');
            const overlay = document.getElementById('mobile-sidebar-overlay');
            
            if (!btn || !overlay) {
                logger.log('⏳ 元素未找到，200ms後重試');
                setTimeout(simpleInitMenu, 200);
                return;
            }
            
            // ✅ 确保遮罩初始状态是隐藏的
            overlay.style.display = 'none';
            overlay.style.opacity = '0';
            overlay.style.pointerEvents = 'none';
            
            // ✅ 确保认证加载动画已隐藏
            const authLoading = document.querySelector('.auth-loading');
            if (authLoading) {
                authLoading.style.display = 'none';
            }
            
            // ✅ 确保 body 有 auth-ready 类
            document.body.classList.add('auth-ready');
            document.body.classList.remove('auth-checking');
            document.documentElement.classList.add('auth-ready');
            document.documentElement.classList.remove('auth-checking');
            
            logger.log('✅ 找到所有元素！');
            
            // 按鈕點擊處理
            btn.addEventListener('click', function() {
                logger.log('🔵 按鈕被點擊！');
                openSidebar();
            });
            
            // 觸摸處理
            btn.addEventListener('touchend', function(e) {
                e.preventDefault();
                logger.log('🔵 觸摸事件！');
                openSidebar();
            });
            
            // 遮罩點擊關閉
            overlay.addEventListener('click', function() {
                logger.log('🔵 點擊遮罩關閉');
                closeSidebar();
            });
            
            // 遮罩觸摸關閉
            overlay.addEventListener('touchend', function(e) {
                e.preventDefault();
                logger.log('🔵 觸摸遮罩關閉');
                closeSidebar();
            });
            
            logger.log('✅ 所有事件監聽器已綁定');
        }
        
        // 立即嘗試初始化
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', simpleInitMenu);
        } else {
            setTimeout(simpleInitMenu, 100);
        }
        
        // ✅ 紧急修复：页面加载后立即执行（不等待load事件）
        function emergencyOverlayCleanup() {
            logger.log('🔧 执行紧急遮罩清理...');
            
            // 隐藏所有可能的遮罩层
            const overlays = [
                document.getElementById('mobile-sidebar-overlay'),
                document.querySelector('.auth-loading'),
                document.querySelector('.modal-overlay'),
                document.getElementById('deleteProjectModal')
            ];
            
            overlays.forEach(overlay => {
                if (overlay) {
                    overlay.style.display = 'none';
                    overlay.style.opacity = '0';
                    overlay.style.pointerEvents = 'none';
                }
            });
            
            // 确保 body 可见
            document.body.classList.add('auth-ready');
            document.body.classList.remove('auth-checking');
            document.documentElement.classList.add('auth-ready');
            document.documentElement.classList.remove('auth-checking');
            document.body.style.visibility = 'visible';
            document.body.style.overflow = 'auto';
            
            logger.log('✅ 遮罩清理完成');
        }
        
        // 立即执行一次
        setTimeout(emergencyOverlayCleanup, 1000); // 1秒后强制清理
        
        // load事件也执行一次
        window.addEventListener('load', emergencyOverlayCleanup);
        
        // DOMContentLoaded也执行一次
        document.addEventListener('DOMContentLoaded', emergencyOverlayCleanup);
        
        // 暴露函數供側邊欄內的連結使用
        window.closeMobileSidebar = closeSidebar;
    </script>
</main>
