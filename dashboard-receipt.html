<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receipt Scanning - VaultCaddy</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="dashboard.css">
    <style>
        /* Dashboard 白色主題覆蓋樣式 */
        body {
            background: #f8fafc !important;
            color: #1f2937 !important;
            padding-top: 80px !important;
        }
        
        .dashboard-container {
            display: flex !important;
            min-height: calc(100vh - 80px) !important;
            margin-top: 0 !important;
        }
        
        .sidebar {
            width: 280px !important;
            background: #ffffff !important;
            border-right: 1px solid #e5e7eb !important;
            flex-shrink: 0 !important;
            overflow-y: auto !important;
        }
        
        .main-content {
            flex: 1 !important;
            background: #ffffff !important;
            overflow-y: auto !important;
        }
        
        .content-header {
            padding: 2rem !important;
            border-bottom: 1px solid #e5e7eb !important;
            background: #ffffff !important;
        }
        
        .content-body {
            padding: 2rem !important;
        }
        
        .feature-highlight {
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            border-radius: 8px;
            padding: 1.5rem;
            margin: 1rem 0;
        }
        
        .upload-area {
            border: 2px dashed #d1d5db;
            border-radius: 8px;
            padding: 3rem;
            text-align: center;
            background: #f9fafb;
            margin: 2rem 0;
            transition: all 0.3s ease;
        }
        
        .upload-area:hover {
            border-color: #059669;
            background: #f0fdf4;
        }
        
        .btn-primary {
            background: #059669;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
        }
        
        .btn-primary:hover {
            background: #047857;
        }
    </style>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="translations.js"></script>
    <script src="unified-auth.js"></script>
    <script src="navbar-component.js"></script>
    <script src="document-processor.js"></script>
    <script src="upload-handler.js"></script>
    <script src="dashboard-stats.js"></script>
    <script src="document-manager.js"></script>
    <script src="sidebar-component.js"></script>
    <link rel="stylesheet" href="document-manager.css">
</head>
<body>
    <!-- 導航欄 - 由 navbar-component.js 動態載入 -->
    <div id="navbar-placeholder"></div>

    <!-- Dashboard 容器 -->
    <div class="dashboard-container">
        <!-- 左側邊欄 -->
        <aside class="sidebar">
            <!-- 側邊欄內容由 sidebar-component.js 動態生成 -->
        </aside>

        <!-- 主內容區域 -->
        <main class="main-content">
            <!-- 頂部標題和控制 -->
            <header class="content-header">
                <div class="header-left">
                    <h1>Receipt Scanning</h1>
                    <p>Manage and view your receipt documents</p>
                </div>
                <div class="header-right">
                    <button class="help-btn" onclick="showHelp()">Need Help?</button>
                </div>
            </header>

            <!-- 控制區域 -->
            <section class="controls-section">
                <div class="controls-bar">
                    <div class="search-filter">
                        <input type="text" placeholder="Filter document name..." class="filter-input">
                    </div>
                    <div class="actions">
                        <button class="upload-btn">
                            <i class="fas fa-upload"></i>
                            Upload files
                        </button>
                        <button class="view-btn">
                            <i class="fas fa-eye"></i>
                            View
                        </button>
                    </div>
                </div>
            </section>

            <!-- 文檔表格 -->
            <section class="documents-table">
                <div class="table-container">
                    <table class="documents-grid">
                        <thead>
                            <tr>
                                <th>
                                    <input type="checkbox" class="select-all">
                                    Document
                                </th>
                                <th>Merchant Info</th>
                                <th>Amount</th>
                                <th>Date Uploaded</th>
                                <th>Status & Review</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- 由 document-manager.js 動態生成 -->
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- 選擇信息 -->
            <div class="selection-info">
                0 of 0 row(s) selected.
            </div>
        </main>
    </div>

    <script>
        // 檢查登入狀態
        function checkLoginStatus() {
            const vaultcaddyToken = localStorage.getItem('vaultcaddy_token');
            const vaultcaddyUser = localStorage.getItem('vaultcaddy_user');
            const userLoggedIn = localStorage.getItem('userLoggedIn');
            
            return (vaultcaddyToken && vaultcaddyUser) || userLoggedIn === 'true';
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 檢查登入狀態
            if (!checkLoginStatus()) {
                window.location.href = 'index.html';
                return;
            }

            // 文件上傳處理
            const fileInput = document.getElementById('receipt-file-input');
            const uploadArea = document.getElementById('receipt-upload-area');

            fileInput.addEventListener('change', function(e) {
                handleFileUpload(e.target.files);
            });

            // 拖拽上傳
            uploadArea.addEventListener('dragover', function(e) {
                e.preventDefault();
                uploadArea.style.borderColor = '#059669';
                uploadArea.style.backgroundColor = '#f0fdf4';
            });

            uploadArea.addEventListener('dragleave', function(e) {
                e.preventDefault();
                uploadArea.style.borderColor = '#d1d5db';
                uploadArea.style.backgroundColor = '#f9fafb';
            });

            uploadArea.addEventListener('drop', function(e) {
                e.preventDefault();
                uploadArea.style.borderColor = '#d1d5db';
                uploadArea.style.backgroundColor = '#f9fafb';
                handleFileUpload(e.dataTransfer.files);
            });
        });

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 檢查登入狀態
            if (!checkLoginStatus()) {
                window.location.href = 'index.html';
                return;
            }

            // 初始化統一側邊欄
            window.receiptSidebar = new VaultCaddySidebar('receipt');
            
            // 初始化文檔管理器
            window.receiptDocumentManager = new DocumentManager('receipt');
            
            // 初始化上傳處理器
            window.receiptUploadHandler = initializeUploadHandler('#upload-area', 'receipt');
            
            console.log('✅ Receipt Dashboard 初始化完成');
        });
        
        function showHelp() {
            alert('Receipt Scanning Help:\n\n1. 上傳收據圖片\n2. AI自動提取數據\n3. 查看和編輯結果\n4. 下載處理後的文件');
        }
    </script>
</body>
</html>
