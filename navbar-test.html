<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>導航欄測試 - VaultCaddy</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="translations.js"></script>
    <script src="navbar-component.js"></script>
    <style>
        body {
            background: #f8fafc;
            padding: 2rem;
            font-family: Arial, sans-serif;
        }
        .test-container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .test-item {
            margin-bottom: 1rem;
            padding: 1rem;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
        }
        .test-item.success {
            border-color: #059669;
            background: #f0fdf4;
        }
        .test-item.error {
            border-color: #dc2626;
            background: #fef2f2;
        }
        .test-item h3 {
            margin: 0 0 0.5rem 0;
            color: #1f2937;
        }
        .test-item p {
            margin: 0;
            color: #6b7280;
        }
        pre {
            background: #f3f4f6;
            padding: 1rem;
            border-radius: 6px;
            overflow-x: auto;
            font-size: 0.875rem;
        }
    </style>
</head>
<body>
    <div id="navbar-placeholder"></div>

    <div class="test-container">
        <h1>🔧 VaultCaddy 導航欄診斷工具</h1>
        <p>這個頁面用來診斷導航欄問題</p>

        <div id="test-results">
            <div class="test-item">
                <h3>正在執行診斷...</h3>
                <p>請稍候...</p>
            </div>
        </div>
    </div>

    <script>
        function addTestResult(id, title, message, type, details = null) {
            const container = document.getElementById('test-results');
            const item = document.createElement('div');
            item.className = `test-item ${type}`;
            item.id = id;
            
            let html = `<h3>${title}</h3><p>${message}</p>`;
            if (details) {
                html += `<pre>${details}</pre>`;
            }
            
            item.innerHTML = html;
            container.appendChild(item);
        }

        function runDiagnostics() {
            console.log('🔧 開始診斷導航欄問題...');
            
            // 清除之前的結果
            document.getElementById('test-results').innerHTML = '';
            
            // 1. 檢查 navbar-placeholder 是否存在
            const placeholder = document.getElementById('navbar-placeholder');
            if (placeholder) {
                addTestResult('placeholder-test', 
                    '✅ navbar-placeholder 存在', 
                    'navbar-placeholder 元素已找到', 
                    'success');
            } else {
                addTestResult('placeholder-test', 
                    '❌ navbar-placeholder 不存在', 
                    'navbar-placeholder 元素未找到', 
                    'error');
                return; // 無法繼續測試
            }
            
            // 2. 檢查 translations.js 是否載入
            if (typeof translations !== 'undefined') {
                addTestResult('translations-test', 
                    '✅ translations.js 已載入', 
                    '多語言文件載入成功', 
                    'success',
                    `可用語言: ${Object.keys(translations).join(', ')}`);
            } else {
                addTestResult('translations-test', 
                    '❌ translations.js 未載入', 
                    '多語言文件載入失敗', 
                    'error');
            }
            
            // 3. 檢查 VaultCaddyNavbar 是否存在
            if (window.VaultCaddyNavbar) {
                addTestResult('navbar-class-test', 
                    '✅ VaultCaddyNavbar 類別已載入', 
                    'navbar-component.js 載入成功', 
                    'success');
                
                // 4. 檢查初始化狀態
                setTimeout(() => {
                    const navbarContent = placeholder.innerHTML;
                    if (navbarContent && navbarContent.trim().length > 0) {
                        addTestResult('navbar-render-test', 
                            '✅ 導航欄已渲染', 
                            '導航欄內容已成功載入', 
                            'success',
                            `內容長度: ${navbarContent.length} 字符`);
                    } else {
                        addTestResult('navbar-render-test', 
                            '❌ 導航欄未渲染', 
                            '導航欄內容為空或渲染失敗', 
                            'error',
                            `placeholder HTML: ${placeholder.outerHTML}`);
                        
                        // 5. 嘗試手動初始化
                        console.log('🔄 嘗試手動初始化導航欄...');
                        try {
                            window.VaultCaddyNavbar.init();
                            
                            setTimeout(() => {
                                const newContent = placeholder.innerHTML;
                                if (newContent && newContent.trim().length > 0) {
                                    addTestResult('manual-init-test', 
                                        '✅ 手動初始化成功', 
                                        '手動調用 init() 後導航欄已載入', 
                                        'success');
                                } else {
                                    addTestResult('manual-init-test', 
                                        '❌ 手動初始化失敗', 
                                        '即使手動調用 init() 也無法載入導航欄', 
                                        'error');
                                }
                            }, 500);
                            
                        } catch (error) {
                            addTestResult('manual-init-test', 
                                '❌ 手動初始化錯誤', 
                                `初始化過程中發生錯誤: ${error.message}`, 
                                'error',
                                error.stack);
                        }
                    }
                }, 1000);
                
            } else {
                addTestResult('navbar-class-test', 
                    '❌ VaultCaddyNavbar 類別未載入', 
                    'navbar-component.js 載入失敗或執行錯誤', 
                    'error');
            }
            
            // 6. 檢查 localStorage 狀態
            const userLoggedIn = localStorage.getItem('userLoggedIn');
            const userCredits = localStorage.getItem('userCredits');
            const vaultcaddyToken = localStorage.getItem('vaultcaddy_token');
            
            addTestResult('localStorage-test', 
                '📊 LocalStorage 狀態', 
                '檢查認證相關的儲存狀態', 
                'success',
                `userLoggedIn: ${userLoggedIn}
userCredits: ${userCredits}
vaultcaddy_token: ${vaultcaddyToken ? '存在' : '不存在'}`);
            
            // 7. 檢查控制台錯誤
            addTestResult('console-test', 
                '📝 控制台檢查', 
                '請檢查瀏覽器控制台是否有錯誤信息', 
                'success',
                '按 F12 開啟控制台查看詳細錯誤信息');
        }

        // 頁面載入完成後運行診斷
        document.addEventListener('DOMContentLoaded', function() {
            console.log('📄 頁面載入完成，開始診斷...');
            setTimeout(runDiagnostics, 100);
        });

        // 也在頁面完全載入後再次檢查
        window.addEventListener('load', function() {
            console.log('🌍 頁面完全載入，再次檢查...');
            setTimeout(() => {
                const placeholder = document.getElementById('navbar-placeholder');
                if (placeholder && placeholder.innerHTML.trim() === '') {
                    console.log('⚠️ 導航欄仍然為空，執行深度診斷...');
                    setTimeout(runDiagnostics, 500);
                }
            }, 1000);
        });
    </script>
</body>
</html>
