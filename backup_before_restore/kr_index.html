ter; gap: 0.5rem;"> <!-- 漢堡菜單按鈕（僅手機顯示）--> <button id="mobile-menu-btn" onclick="openMobileSidebar()" style="display: none; background: none; border: none; cursor: pointer; padding: 0.5rem; color: #1f2937; font-size: 1.5rem;"> <i class="fas fa-bars"></i> </button> <a href="index.html" style="display: flex; align-items: center; gap: 0.75rem; text-decoration: none; color: #1f2937; font-weight: 600; font-size: 1.125rem;"> <div class="desktop-logo" style="width: 32px; height: 32px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 1.25rem;"> V </div> <div class="desktop-logo-text"> <div>VaultCaddy</div> <div style="font-size: 0.75rem; color: #6b7280; font-weight: 400; text-transform: uppercase; letter-spacing: 0.05em;">AI DOCUMENT PROCESSING</div> </div> </a> </div> <div style="display: flex; align-items: center; gap: 2rem;"> <div style="display: flex; align-items: center; gap: 2rem;"> <a href="index.html#features" style="color: #4b5563; text-decoration: none; font-size: 0.9375rem; font-weight: 500; transition: color 0.2s;">功能</a> <a href="index.html#pricing" style="color: #4b5563; text-decoration: none; font-size: 0.9375rem; font-weight: 500; transition: color 0.2s;">價格</a> <a href="/blog/" style="color: #4b5563; text-decoration: none; font-size: 0.9375rem; font-weight: 500; transition: color 0.2s;">學習中心</a> <a href="dashboard.html" style="color: #4b5563; text-decoration: none; font-size: 0.9375rem; font-weight: 500; transition: color 0.2s;">儀表板</a> </div> <div id="user-menu" style="position: relative; display: flex; align-items: center; gap: 0.75rem;">
                <div id="language-switcher" style="display: none !important;"></div> <style> @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } } /* 🔥 手機版優惠橫幅優化 */ @media (max-width: 768px) { /* 优惠横幅第2行改为垂直布局 */ div[style*="z-index: 1002"] > div:last-child { flex-direction: column !important; gap: 0.35rem !important; } } </style> <script> // Exit Intent Detection let exitPopupShown = false; document.addEventListener('mouseleave', function(e) { if (e.clientY < 10 && !exitPopupShown && !localStorage.getItem('exitPopupShown')) { showExitPopup(); } }); function showExitPopup() { const popup = document.getElementById('exit-popup'); if (popup) { popup.style.display = 'flex'; exitPopupShown = true; localStorage.setItem('exitPopupShown', Date.now()); if (typeof gtag !== 'undefined') { gtag('event', 'exit_intent_shown', { 'event_category': 'engagement' }); } } } function closeExitPopup() { const popup = document.getElementById('exit-popup'); if (popup) { popup.style.display = 'none'; } } async function handleExitEmail(e) { e.preventDefault(); const email = document.getElementById('exit-email').value; document.getElementById('exit-email-form').style.display = 'none'; document.getElementById('exit-success').style.display = 'block'; if (typeof gtag !== 'undefined') { gtag('event', 'exit_email_captured', { 'event_category': 'lead_generation', 'event_label': email }); } if (typeof fbq !== 'undefined') { fbq('track', 'Lead'); } setTimeout(() => { closeExitPopup(); window.location.href = 'auth.html?discount=EXIT20'; }, 3000); } const popupTime = localStorage.getItem('exitPopupShown'); if (popupTime && (Date.now() - popupTime > 24 * 60 * 60 * 1000)) { localStorage.removeItem('exitPopupShown'); } </script> <script> // 增强滚动动画效果 document.addEventListener('DOMContentLoaded', function() { // 数字计数动画 const animateNumbers = () => { const stats = [ { id: 'stat-speed', target: 10, suffix: '' }, { id: 'stat-accuracy', target: 98, suffix: '' }, { id: 'stat-clients', target: 200, suffix: '' } ]; stats.forEach(stat => { const element = document.getElementById(stat.id); if (!element) return; let current = 0; const increment = stat.target / 50; const timer = setInterval(() => { current += increment; if (current >= stat.target) { current = stat.target; clearInterval(timer); } element.textContent = Math.floor(current); }, 30); }); }; // 检查元素是否在视口中 const isInViewport = (element) => { const rect = element.getBoundingClientRect(); return rect.top < window.innerHeight && rect.bottom > 0; }; // 当滚动到统计数字时触发动画 let numbersAnimated = false; window.addEventListener('scroll', () => { const heroSection = document.querySelector('main section'); if (!numbersAnimated && heroSection && isInViewport(heroSection)) { animateNumbers(); numbersAnimated = true; } }); // 页面加载时如果已经在视口中，立即触发 const heroSection = document.querySelector('main section'); if (heroSection && isInViewport(heroSection)) { animateNumbers(); numbersAnimated = true; } }); </script> </body>
