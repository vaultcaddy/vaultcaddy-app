 suffix: '' }, { id: 'stat-clients', target: 200, suffix: '' } ]; stats.forEach(stat => { const element = document.getElementById(stat.id); if (!element) return; let current = 0; const increment = stat.target / 50; const timer = setInterval(() => { current += increment; if (current >= stat.target) { current = stat.target; clearInterval(timer); } element.textContent = Math.floor(current); }, 30); }); }; // 检查元素是否在视口中 const isInViewport = (element) => { const rect = element.getBoundingClientRect(); return rect.top < window.innerHeight && rect.bottom > 0; }; // 当滚动到统计数字时触发动画 let numbersAnimated = false; window.addEventListener('scroll', () => { const heroSection = document.querySelector('main section'); if (!numbersAnimated && heroSection && isInViewport(heroSection)) { animateNumbers(); numbersAnimated = true; } }); // 页面加载时如果已经在视口中，立即触发 const heroSection = document.querySelector('main section'); if (heroSection && isInViewport(heroSection)) { animateNumbers(); numbersAnimated = true; } }); </script> </body>
