<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>完整流程測試 - VaultCaddy</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 8px; }
        .success { background: #d4edda; border-color: #c3e6cb; }
        .error { background: #f8d7da; border-color: #f5c6cb; }
        .info { background: #d1ecf1; border-color: #bee5eb; }
        button { padding: 10px 15px; margin: 5px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
        .log { background: #f8f9fa; padding: 10px; margin: 10px 0; border-radius: 4px; font-family: monospace; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h1>VaultCaddy 完整流程測試</h1>
    
    <div class="test-section info">
        <h3>🔍 系統狀態檢查</h3>
        <div id="system-status">檢查中...</div>
        <button onclick="checkSystemStatus()">重新檢查</button>
    </div>
    
    <div class="test-section">
        <h3>🔐 認證測試</h3>
        <div id="auth-status">未測試</div>
        <button onclick="testLogin()">測試登入</button>
        <button onclick="testLogout()">測試登出</button>
        <button onclick="checkAuthStatus()">檢查認證狀態</button>
    </div>
    
    <div class="test-section">
        <h3>🧭 導航測試</h3>
        <div id="navigation-status">未測試</div>
        <button onclick="testNavigation('index.html')">測試首頁</button>
        <button onclick="testNavigation('dashboard-main.html')">測試Dashboard</button>
        <button onclick="testNavigation('auth.html')">測試Auth頁面</button>
        <button onclick="testNavigation('login.html')">測試Login頁面</button>
    </div>
    
    <div class="test-section">
        <h3>📋 Local Storage 內容</h3>
        <div id="localStorage-content"></div>
        <button onclick="showLocalStorage()">顯示內容</button>
        <button onclick="clearLocalStorage()">清除內容</button>
    </div>
    
    <div class="test-section">
        <h3>📝 測試日誌</h3>
        <div id="test-log" class="log"></div>
        <button onclick="clearLog()">清除日誌</button>
    </div>

    <script>
        let testLog = [];
        
        function log(message) {
            const timestamp = new Date().toLocaleTimeString();
            const logEntry = `[${timestamp}] ${message}`;
            testLog.push(logEntry);
            document.getElementById('test-log').textContent = testLog.join('\n');
            console.log(logEntry);
        }
        
        function clearLog() {
            testLog = [];
            document.getElementById('test-log').textContent = '';
        }
        
        function checkSystemStatus() {
            log('🔍 開始系統狀態檢查...');
            
            const checks = [
                { name: 'localStorage 支持', test: () => typeof Storage !== 'undefined' },
                { name: 'navbar-component.js', test: () => typeof window.VaultCaddyNavbar !== 'undefined' },
                { name: 'auth.js', test: () => typeof window.VaultCaddyAuth !== 'undefined' },
                { name: 'unified-auth.js', test: () => typeof window.UnifiedAuthManager !== 'undefined' },
                { name: 'translations.js', test: () => typeof translations !== 'undefined' }
            ];
            
            let allPassed = true;
            let statusHtml = '<ul>';
            
            checks.forEach(check => {
                const passed = check.test();
                statusHtml += `<li>${passed ? '✅' : '❌'} ${check.name}</li>`;
                if (!passed) allPassed = false;
                log(`${passed ? '✅' : '❌'} ${check.name}: ${passed ? '正常' : '失敗'}`);
            });
            
            statusHtml += '</ul>';
            
            const statusDiv = document.getElementById('system-status');
            statusDiv.innerHTML = statusHtml;
            statusDiv.className = allPassed ? 'success' : 'error';
            
            log(`📋 系統狀態檢查${allPassed ? '通過' : '失敗'}`);
        }
        
        function testLogin() {
            log('🔐 開始登入測試...');
            
            try {
                // 設置登入狀態
                localStorage.setItem('userLoggedIn', 'true');
                localStorage.setItem('userCredits', '7');
                
                const userData = {
                    id: 'demo_user',
                    email: 'demo@vaultcaddy.com',
                    name: 'Demo User',
                    credits: 7,
                    avatar: 'https://ui-avatars.com/api/?name=Demo+User&background=3b82f6&color=ffffff&size=32'
                };
                
                localStorage.setItem('vaultcaddy_user', JSON.stringify(userData));
                localStorage.setItem('vaultcaddy_token', 'demo_token_' + Date.now());
                localStorage.setItem('vaultcaddy_login_time', Date.now().toString());
                
                log('✅ 登入狀態已設置');
                
                // 檢查登入狀態
                checkAuthStatus();
                showLocalStorage();
                
                document.getElementById('auth-status').innerHTML = '<div class="success">✅ 登入測試成功</div>';
                
            } catch (error) {
                log('❌ 登入測試失敗: ' + error.message);
                document.getElementById('auth-status').innerHTML = '<div class="error">❌ 登入測試失敗</div>';
            }
        }
        
        function testLogout() {
            log('🚪 開始登出測試...');
            
            try {
                // 清除所有認證相關的 localStorage
                const keysToRemove = [
                    'userLoggedIn', 'userCredits', 'vaultcaddy_user', 
                    'vaultcaddy_token', 'vaultcaddy_login_time'
                ];
                
                keysToRemove.forEach(key => {
                    localStorage.removeItem(key);
                    log(`🗑️ 已清除: ${key}`);
                });
                
                log('✅ 登出完成');
                
                checkAuthStatus();
                showLocalStorage();
                
                document.getElementById('auth-status').innerHTML = '<div class="success">✅ 登出測試成功</div>';
                
            } catch (error) {
                log('❌ 登出測試失敗: ' + error.message);
                document.getElementById('auth-status').innerHTML = '<div class="error">❌ 登出測試失敗</div>';
            }
        }
        
        function checkAuthStatus() {
            log('🔐 檢查認證狀態...');
            
            const userLoggedIn = localStorage.getItem('userLoggedIn');
            const vaultcaddyToken = localStorage.getItem('vaultcaddy_token');
            const vaultcaddyUser = localStorage.getItem('vaultcaddy_user');
            
            const isAuthenticated = userLoggedIn === 'true' || (vaultcaddyToken && vaultcaddyUser);
            
            log(`📊 認證狀態: ${isAuthenticated ? '已登入' : '未登入'}`);
            log(`📊 userLoggedIn: ${userLoggedIn || '未設置'}`);
            log(`📊 vaultcaddyToken: ${vaultcaddyToken ? '已設置' : '未設置'}`);
            log(`📊 vaultcaddyUser: ${vaultcaddyUser ? '已設置' : '未設置'}`);
            
            return isAuthenticated;
        }
        
        function testNavigation(url) {
            log(`🧭 測試導航到: ${url}`);
            
            // 創建一個隱藏的 iframe 來測試頁面是否可以載入
            const iframe = document.createElement('iframe');
            iframe.style.display = 'none';
            iframe.src = url;
            
            iframe.onload = function() {
                log(`✅ ${url} 載入成功`);
                document.body.removeChild(iframe);
            };
            
            iframe.onerror = function() {
                log(`❌ ${url} 載入失敗`);
                document.body.removeChild(iframe);
            };
            
            document.body.appendChild(iframe);
            
            // 5秒後如果還沒載入完成就移除
            setTimeout(() => {
                if (document.body.contains(iframe)) {
                    log(`⏰ ${url} 載入超時`);
                    document.body.removeChild(iframe);
                }
            }, 5000);
        }
        
        function showLocalStorage() {
            const content = document.getElementById('localStorage-content');
            let html = '<table style="width: 100%; border-collapse: collapse;">';
            html += '<tr><th style="border: 1px solid #ddd; padding: 8px;">Key</th><th style="border: 1px solid #ddd; padding: 8px;">Value</th></tr>';
            
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                const value = localStorage.getItem(key);
                
                // 截斷過長的值
                const displayValue = value.length > 50 ? value.substring(0, 50) + '...' : value;
                
                html += `<tr><td style="border: 1px solid #ddd; padding: 8px;">${key}</td><td style="border: 1px solid #ddd; padding: 8px;">${displayValue}</td></tr>`;
            }
            
            html += '</table>';
            content.innerHTML = html;
            
            log(`📋 localStorage 包含 ${localStorage.length} 個項目`);
        }
        
        function clearLocalStorage() {
            localStorage.clear();
            log('🗑️ localStorage 已清空');
            showLocalStorage();
        }
        
        // 頁面載入時自動執行檢查
        document.addEventListener('DOMContentLoaded', function() {
            log('🚀 測試頁面已載入');
            checkSystemStatus();
            showLocalStorage();
        });
    </script>
    
    <!-- 載入相關腳本 -->
    <script src="translations.js"></script>
    <script src="navbar-component.js"></script>
    <script src="auth.js"></script>
    <script src="unified-auth.js"></script>
</body>
</html>
