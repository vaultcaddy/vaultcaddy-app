<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>項目 - VaultCaddy 銀行對賬單轉換工具 | First Project</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; margin:0; background:#f8fafc; }
        .header { background:#10b981; color:white; padding:1rem; text-align:center; }
        .container { max-width:1200px; margin:2rem auto; padding:0 1rem; }
        .upload-area { border:3px dashed #10b981; border-radius:12px; padding:3rem; text-align:center; background:white; }
        .btn { background:#10b981; color:white; padding:1rem 2rem; border:none; border-radius:8px; font-size:1.1rem; cursor:pointer; }
        table { width:100%; border-collapse:collapse; margin-top:2rem; background:white; }
        th, td { padding:1rem; text-align:left; border-bottom:1px solid #eee; }
        .status { padding:0.3rem 0.8rem; border-radius:9999px; font-size:0.85rem; }
    </style>
</head>
<body>
    <div class="header">
        <h1>VaultCaddy - 銀行對賬單轉換工具 (First Project)</h1>
        <p>PDF / 收據 → Excel / QuickBooks / Xero / iXBRL • 香港稅務專用</p>
    </div>

    <div class="container">
        <div class="upload-area">
            <h2>上傳您的銀行對賬單或收據</h2>
            <p style="color:#666; margin:1rem 0;">支援 HSBC、恒生、中銀、渣打等香港主流銀行 PDF</p>
            <button onclick="document.getElementById('fileInput').click()" class="btn">
                <i class="fas fa-cloud-upload-alt"></i> 選擇文件上傳
            </button>
            <input type="file" id="fileInput" style="display:none" accept=".pdf,.jpg,.png">
        </div>

        <h2 style="margin-top:3rem;">您的文件</h2>
        <table>
            <thead>
                <tr>
                    <th>文件名</th>
                    <th>上傳日期</th>
                    <th>類型</th>
                    <th>狀態</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td colspan="5" style="text-align:center; padding:3rem; color:#888;">
                        尚未上傳任何文件<br><br>
                        <small>上傳後可一鍵轉換為 Excel、QuickBooks CSV、iXBRL 報稅檔</small>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
        console.log('%c✅ 已恢復為 2026年3月中以前的銀行對賬單轉換工具 (First Project)', 'color:#10b981; font-size:14px');
        document.getElementById('fileInput').addEventListener('change', function(e) {
            if (e.target.files.length > 0) {
                alert('文件已選擇（模擬）: ' + e.target.files[0].name + '\n\n這是恢復後的 First Project 版本。實際功能可透過 document-detail.html 與 safe-entry.html 使用。');
            }
        });
    </script>
</body>
</html>
